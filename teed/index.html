<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Anime Image Search</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0f1115;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #161b22;
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 220px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    .info {
      padding: 10px 14px;
      color: #aaa;
      font-size: 14px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      padding: 12px;
    }

    .card {
      background: #1b1f27;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      cursor: pointer;
      background: #222;
    }

    .meta {
      padding: 10px;
      font-size: 12px;
      color: #ccc;
      line-height: 1.5;
    }

    .loading {
      text-align: center;
      padding: 30px;
      color: #aaa;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal img {
      max-width: 95%;
      max-height: 95%;
      border-radius: 8px;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
    }
  </style>
</head>
<body>

<header>
  <div class="toolbar">
    <input
      id="searchInput"
      type="text"
      placeholder="例: rem_(re:zero)"
      value="rem_(re:zero)"
    />

    <button id="searchButton">
      Search
    </button>
  </div>
</header>

<div class="info" id="info">
  Ready
</div>

<div class="gallery" id="gallery"></div>

<div class="pagination">
  <button id="prevButton">Prev</button>
  <button id="nextButton">Next</button>
</div>

<div class="modal" id="modal">
  <img id="modalImage" src="" alt="">
</div>

<script>
  "use strict";

  /**
   * Danbooru Image Viewer
   * Tested: Chrome 136 / Firefox 138
   */

  const gallery = document.getElementById("gallery");
  const info = document.getElementById("info");

  const searchInput = document.getElementById("searchInput");
  const searchButton = document.getElementById("searchButton");

  const prevButton = document.getElementById("prevButton");
  const nextButton = document.getElementById("nextButton");

  const modal = document.getElementById("modal");
  const modalImage = document.getElementById("modalImage");

  let currentPage = 1;

  const LIMIT = 20;

  async function searchImages(page = 1) {
    const keyword = searchInput.value.trim();

    if (!keyword) {
      alert("Tag required");
      return;
    }

    gallery.innerHTML = "";
    info.textContent = "Loading...";

    try {

      // rating:safe でNSFW除外
      const tags = `${keyword} rating:safe`;

      const url =
        `https://danbooru.donmai.us/posts.json` +
        `?tags=${encodeURIComponent(tags)}` +
        `&limit=${LIMIT}` +
        `&page=${page}`;

      const response = await fetch(url);

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const posts = await response.json();

      if (!Array.isArray(posts) || posts.length === 0) {
        info.textContent = "No images found";
        return;
      }

      info.textContent =
        `Page ${page} / ${posts.length} images`;

      for (const post of posts) {

        // file_url が無い場合スキップ
        if (!post.file_url) {
          continue;
        }

        const card = document.createElement("div");
        card.className = "card";

        const image = document.createElement("img");

        image.loading = "lazy";
        image.src = post.preview_file_url || post.file_url;
        image.alt = post.tag_string_character || "image";

        image.addEventListener("click", () => {
          modal.style.display = "flex";
          modalImage.src = post.file_url;
        });

        const meta = document.createElement("div");
        meta.className = "meta";

        meta.innerHTML = `
          <div>ID: ${post.id}</div>
          <div>Score: ${post.score}</div>
          <div>Size: ${post.image_width}x${post.image_height}</div>
        `;

        card.appendChild(image);
        card.appendChild(meta);

        gallery.appendChild(card);
      }

    } catch (error) {

      console.error(error);

      info.textContent =
        `Error: ${error.message}`;
    }
  }

  searchButton.addEventListener("click", () => {
    currentPage = 1;
    searchImages(currentPage);
  });

  searchInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      currentPage = 1;
      searchImages(currentPage);
    }
  });

  nextButton.addEventListener("click", () => {
    currentPage++;
    searchImages(currentPage);
  });

  prevButton.addEventListener("click", () => {

    if (currentPage <= 1) {
      return;
    }

    currentPage--;

    searchImages(currentPage);
  });

  modal.addEventListener("click", () => {
    modal.style.display = "none";
    modalImage.src = "";
  });

  // 初回検索
  searchImages(currentPage);

</script>

</body>
</html>
