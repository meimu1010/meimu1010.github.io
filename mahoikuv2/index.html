<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魔法少女育成計画 ～選ばれし者たちへ～</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700;900&family=Shippori+Mincho+B1:wght@400;700;800&family=Cinzel+Decorative:wght@400;700&display=swap');

:root {
  --bg: #06010f;
  --surface: #0d0120;
  --pink: #f72585;
  --rose: #c9184a;
  --pale-pink: #ffb3c6;
  --purple: #7209b7;
  --deep: #3a0ca3;
  --cyan: #4cc9f0;
  --gold: #ffd60a;
  --silver: #c8c8d0;
  --white: #f8f0ff;
  --text-main: #ede0f5;
  --text-sub: #9b8aac;
  --glow-pink: 0 0 24px #f7258566, 0 0 60px #f7258522;
  --glow-gold: 0 0 16px #ffd60a88;
  --panel-bg: rgba(13,1,32,0.92);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text-main);
  font-family: 'Noto Serif JP', serif;
}

/* ─── CANVAS BACKDROP ─── */
#bg-canvas {
  position: fixed; inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ─── SCENE BACKGROUND ─── */
#scene-bg {
  position: fixed; inset: 0;
  z-index: 1;
  transition: background 1.2s ease, opacity 0.6s ease;
  pointer-events: none;
}

/* ─── VIGNETTE ─── */
#vignette {
  position: fixed; inset: 0; z-index: 2;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(6,1,15,0.7) 100%);
  pointer-events: none;
}

/* ─── MAIN WRAPPER ─── */
#game {
  position: fixed; inset: 0; z-index: 3;
  display: flex; flex-direction: column;
  justify-content: flex-end;
}

/* ─── CHARACTER AREA ─── */
#char-area {
  position: absolute;
  bottom: 220px;
  left: 0; right: 0;
  display: flex;
  justify-content: space-around;
  align-items: flex-end;
  padding: 0 80px;
  pointer-events: none;
}

.char-figure {
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: opacity 0.6s ease, transform 0.6s ease, filter 0.6s ease;
  opacity: 0;
  transform: translateY(20px);
}

.char-figure.visible {
  opacity: 1;
  transform: translateY(0);
}

.char-figure.dim {
  opacity: 0.35;
  filter: grayscale(0.5) brightness(0.6);
}

.char-emoji {
  font-size: clamp(70px, 12vw, 100px);
  filter: drop-shadow(0 0 20px rgba(247,37,133,0.5));
  animation: char-float 4s ease-in-out infinite;
  line-height: 1;
}

.char-figure.speaking .char-emoji {
  filter: drop-shadow(0 0 30px rgba(247,37,133,0.9));
  animation: char-float 3s ease-in-out infinite, char-pulse 1.5s ease-in-out infinite;
}

.char-name-tag {
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--pale-pink);
  background: rgba(247,37,133,0.15);
  border: 1px solid rgba(247,37,133,0.4);
  padding: 3px 12px;
  border-radius: 20px;
  margin-top: 8px;
  white-space: nowrap;
}

/* ─── DIALOGUE BOX ─── */
#dialogue-wrap {
  padding: 0 20px 20px;
  pointer-events: none;
}

#dialogue-box {
  position: relative;
  background: var(--panel-bg);
  border: 1px solid rgba(247,37,133,0.3);
  border-radius: 6px;
  padding: 22px 28px 20px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 40px rgba(247,37,133,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
  pointer-events: all;
  cursor: pointer;
  min-height: 130px;
  overflow: hidden;
}

#dialogue-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--pink), transparent);
  opacity: 0.7;
}

#speaker-name {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.3em;
  color: var(--pink);
  text-shadow: var(--glow-pink);
  margin-bottom: 10px;
  min-height: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

#speaker-name::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(247,37,133,0.4), transparent);
}

#dialogue-text {
  font-size: clamp(14px, 2vw, 17px);
  line-height: 2;
  color: var(--text-main);
  min-height: 64px;
  letter-spacing: 0.05em;
}

#advance-hint {
  position: absolute;
  bottom: 12px; right: 18px;
  font-size: 11px;
  color: var(--text-sub);
  letter-spacing: 0.2em;
  animation: blink 1.4s ease-in-out infinite;
}

/* ─── CHOICES ─── */
#choice-wrap {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(6,1,15,0.75);
  backdrop-filter: blur(6px);
  gap: 14px;
  padding: 40px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

#choice-wrap.visible {
  opacity: 1;
  pointer-events: all;
}

.choice-label {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 14px;
  color: var(--text-sub);
  letter-spacing: 0.4em;
  margin-bottom: 8px;
}

.choice-btn {
  width: 100%;
  max-width: 560px;
  background: rgba(13,1,32,0.85);
  border: 1px solid rgba(247,37,133,0.35);
  color: var(--text-main);
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;
  letter-spacing: 0.1em;
  line-height: 1.6;
  padding: 16px 28px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.25s ease;
  text-align: left;
  position: relative;
  overflow: hidden;
}

.choice-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--pink);
  transform: scaleY(0);
  transition: transform 0.2s ease;
}

.choice-btn:hover {
  border-color: var(--pink);
  background: rgba(247,37,133,0.12);
  box-shadow: 0 0 20px rgba(247,37,133,0.15);
  transform: translateX(4px);
}

.choice-btn:hover::before { transform: scaleY(1); }

/* ─── TITLE SCREEN ─── */
#title-screen {
  position: fixed; inset: 0; z-index: 50;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg);
  transition: opacity 0.8s ease;
}

#title-screen.fade-out {
  opacity: 0;
  pointer-events: none;
}

.title-ornament {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(247,37,133,0.15);
  pointer-events: none;
}

.title-main-logo {
  text-align: center;
  position: relative;
  z-index: 1;
}

.title-en {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(10px, 1.5vw, 14px);
  letter-spacing: 0.5em;
  color: var(--text-sub);
  margin-bottom: 16px;
}

.title-jp {
  font-family: 'Shippori Mincho B1', serif;
  font-size: clamp(32px, 6vw, 58px);
  font-weight: 800;
  letter-spacing: 0.3em;
  background: linear-gradient(135deg, var(--white) 0%, var(--pale-pink) 40%, var(--pink) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.2;
  margin-bottom: 6px;
  animation: title-shimmer 4s ease-in-out infinite;
}

.title-sub {
  font-size: clamp(12px, 1.8vw, 15px);
  letter-spacing: 0.6em;
  color: var(--text-sub);
  margin-top: 8px;
}

.title-divider {
  display: flex; align-items: center; gap: 16px;
  margin: 28px 0;
  justify-content: center;
}

.title-divider-line {
  width: 100px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--pink));
}
.title-divider-line:last-child {
  background: linear-gradient(90deg, var(--pink), transparent);
}

.title-star {
  color: var(--pink);
  font-size: 18px;
  text-shadow: var(--glow-pink);
  animation: spin-slow 6s linear infinite;
}

.title-start-btn {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 17px;
  letter-spacing: 0.5em;
  color: var(--white);
  background: transparent;
  border: 1px solid var(--pink);
  padding: 14px 48px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
  animation: pulse-border 2.5s ease-in-out infinite;
}

.title-start-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--rose), var(--purple));
  transform: translateY(100%);
  transition: transform 0.35s ease;
}

.title-start-btn span { position: relative; z-index: 1; }

.title-start-btn:hover::before { transform: translateY(0); }
.title-start-btn:hover { box-shadow: var(--glow-pink); letter-spacing: 0.7em; }

/* ─── CHAPTER TITLE ─── */
#chapter-overlay {
  position: fixed; inset: 0; z-index: 40;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(6,1,15,0.96);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
}

#chapter-overlay.visible {
  opacity: 1;
}

.chapter-num {
  font-family: 'Cinzel Decorative', cursive;
  font-size: 13px;
  letter-spacing: 0.6em;
  color: var(--text-sub);
  margin-bottom: 16px;
}

.chapter-title-text {
  font-family: 'Shippori Mincho B1', serif;
  font-size: clamp(22px, 4vw, 38px);
  font-weight: 700;
  letter-spacing: 0.3em;
  color: var(--white);
  text-align: center;
  animation: chapter-slide 0.8s ease forwards;
}

.chapter-line {
  width: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--pink), transparent);
  margin: 18px auto;
  animation: chapter-line-expand 0.8s 0.3s ease forwards;
}

/* ─── ENDING ─── */
#ending-screen {
  position: fixed; inset: 0; z-index: 50;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg);
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s ease;
  padding: 40px;
  text-align: center;
}

#ending-screen.visible {
  opacity: 1;
  pointer-events: all;
}

.ending-type {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(11px, 1.5vw, 13px);
  letter-spacing: 0.6em;
  color: var(--text-sub);
  margin-bottom: 16px;
}

.ending-title {
  font-family: 'Shippori Mincho B1', serif;
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 800;
  margin-bottom: 24px;
  animation: fadeInUp 1s 0.4s forwards;
  opacity: 0;
}

.ending-title.true { color: var(--gold); text-shadow: var(--glow-gold); }
.ending-title.bad { color: var(--rose); text-shadow: 0 0 24px rgba(201,24,74,0.6); }
.ending-title.normal { color: var(--silver); }

.ending-body {
  max-width: 560px;
  font-size: 15px;
  line-height: 2.2;
  color: var(--text-sub);
  margin-bottom: 40px;
  animation: fadeInUp 1s 0.8s forwards;
  opacity: 0;
}

.ending-btn {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 14px;
  letter-spacing: 0.4em;
  color: var(--white);
  background: transparent;
  border: 1px solid rgba(247,37,133,0.4);
  padding: 12px 36px;
  cursor: pointer;
  transition: all 0.3s ease;
  animation: fadeInUp 1s 1.2s forwards;
  opacity: 0;
}

.ending-btn:hover {
  border-color: var(--pink);
  background: rgba(247,37,133,0.1);
  box-shadow: var(--glow-pink);
}

/* ─── GLITCH ─── */
.glitch {
  animation: glitch 0.3s ease;
}

/* ─── STATUS BAR ─── */
#status-bar {
  position: fixed;
  top: 16px; right: 20px;
  z-index: 30;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  pointer-events: none;
}

.status-item {
  font-size: 10px;
  letter-spacing: 0.25em;
  color: var(--text-sub);
  background: rgba(13,1,32,0.7);
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid rgba(247,37,133,0.15);
}

/* ─── SKIP / LOG ─── */
#ui-controls {
  position: fixed;
  top: 16px; left: 20px;
  z-index: 30;
  display: flex;
  gap: 8px;
}

.ui-btn {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  letter-spacing: 0.25em;
  color: var(--text-sub);
  background: rgba(13,1,32,0.7);
  border: 1px solid rgba(247,37,133,0.15);
  padding: 6px 16px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  display: none;
}

.ui-btn:hover {
  border-color: rgba(247,37,133,0.5);
  color: var(--white);
}

.ui-btn.active { display: inline-block; }

/* ─── ANIMATIONS ─── */
@keyframes char-float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes char-pulse {
  0%,100% { filter: drop-shadow(0 0 20px rgba(247,37,133,0.6)); }
  50% { filter: drop-shadow(0 0 40px rgba(247,37,133,1)); }
}

@keyframes blink {
  0%,100% { opacity: 0.4; }
  50% { opacity: 1; }
}

@keyframes title-shimmer {
  0%,100% { filter: brightness(1); }
  50% { filter: brightness(1.15) drop-shadow(0 0 20px rgba(247,37,133,0.4)); }
}

@keyframes spin-slow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes pulse-border {
  0%,100% { box-shadow: 0 0 8px rgba(247,37,133,0.2); }
  50% { box-shadow: 0 0 24px rgba(247,37,133,0.5); }
}

@keyframes chapter-slide {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes chapter-line-expand {
  from { width: 0; }
  to { width: 200px; }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes glitch {
  0% { transform: translate(0); filter: none; }
  20% { transform: translate(-4px, 2px); filter: hue-rotate(90deg); }
  40% { transform: translate(4px, -2px); filter: hue-rotate(180deg); }
  60% { transform: translate(-2px, -4px); filter: hue-rotate(270deg); }
  80% { transform: translate(2px, 4px); filter: none; }
  100% { transform: translate(0); filter: none; }
}

@keyframes screen-flash {
  0%,100% { opacity: 0; }
  50% { opacity: 1; }
}

#flash-overlay {
  position: fixed; inset: 0;
  z-index: 45;
  pointer-events: none;
  opacity: 0;
}


/* ─── SAVE PANEL ─── */
#save-panel {
  position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(6,1,15,0.88);backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity 0.35s ease;padding:30px;
}
#save-panel.visible{opacity:1;pointer-events:all;}
.save-panel-inner{
  background:rgba(13,1,32,0.97);border:1px solid rgba(247,37,133,0.35);
  border-radius:6px;padding:28px 32px;width:100%;max-width:480px;
  box-shadow:0 0 40px rgba(247,37,133,0.08);
}
.save-panel-title{
  font-family:'Shippori Mincho B1',serif;font-size:18px;letter-spacing:0.5em;
  color:var(--gold);text-align:center;margin-bottom:20px;text-shadow:var(--glow-gold);
}
.save-slot{
  display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;
  padding:12px 14px;border:1px solid rgba(247,37,133,0.2);border-radius:4px;
  margin-bottom:10px;background:rgba(247,37,133,0.03);
}
.slot-info{min-width:0;}
.slot-num{font-size:10px;color:var(--text-sub);letter-spacing:0.3em;margin-bottom:3px;}
.slot-chapter{font-size:15px;color:var(--white);font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slot-preview{font-size:13px;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slot-date{font-size:12px;color:var(--text-sub);margin-top:2px;}
.slot-btns{display:flex;gap:6px;flex-shrink:0;}
.slot-btn{font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:0.2em;padding:8px 16px;border-radius:3px;cursor:pointer;transition:all 0.2s;border:1px solid;}
.slot-save{background:transparent;border-color:rgba(247,37,133,0.5);color:var(--pink);}
.slot-save:hover{background:rgba(247,37,133,0.15);}
.slot-load{background:transparent;border-color:rgba(255,214,10,0.5);color:var(--gold);}
.slot-load:hover:not(:disabled){background:rgba(255,214,10,0.1);}
.slot-load:disabled{opacity:0.3;cursor:not-allowed;}
.save-panel-close{
  font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:0.3em;
  color:var(--text-sub);background:transparent;border:1px solid rgba(247,37,133,0.2);
  padding:8px 24px;border-radius:3px;cursor:pointer;margin-top:14px;width:100%;
  transition:all 0.2s;
}
.save-panel-close:hover{border-color:var(--pink);color:var(--white);}


/* ─── ??? BUTTON ─── */
.title-mystery-btn {
  display: block;
  margin: 14px auto 0;
  background: transparent;
  border: 1px solid rgba(153,102,204,0.6);
  font-family: 'Shippori Mincho B1', serif;
  font-size: 14px;
  letter-spacing: 0.6em;
  color: rgba(200,160,255,0.85);
  cursor: pointer;
  padding: 10px 36px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
  text-shadow: 0 0 10px rgba(153,102,204,0.5);
  box-shadow: 0 0 12px rgba(153,102,204,0.15);
}
.title-mystery-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #3a006a, #1a0030);
  transform: translateY(100%);
  transition: transform 0.35s ease;
}
.title-mystery-btn span { position: relative; z-index: 1; }
.title-mystery-btn:hover::before { transform: translateY(0); }
.title-mystery-btn:hover {
  color: #fff;
  letter-spacing: 0.8em;
  box-shadow: 0 0 20px rgba(153,102,204,0.5);
  border-color: rgba(200,160,255,0.9);
}


/* ─── BACKLOG ─── */
#backlog-panel {
  position:fixed;inset:0;z-index:70;background:rgba(6,1,15,0.92);
  backdrop-filter:blur(10px);display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
#backlog-panel.visible{opacity:1;pointer-events:all;}
#backlog-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 24px;border-bottom:1px solid rgba(247,37,133,0.2);
  font-family:'Shippori Mincho B1',serif;font-size:13px;letter-spacing:0.4em;color:var(--gold);
}
#backlog-close{
  background:transparent;border:1px solid rgba(247,37,133,0.3);color:var(--text-sub);
  font-family:'Noto Serif JP',serif;font-size:11px;letter-spacing:0.2em;
  padding:5px 14px;border-radius:3px;cursor:pointer;transition:all 0.2s;
}
#backlog-close:hover{border-color:var(--pink);color:var(--white);}
#backlog-list{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:10px;}
#backlog-list::-webkit-scrollbar{width:4px;}
#backlog-list::-webkit-scrollbar-thumb{background:rgba(247,37,133,0.3);border-radius:2px;}
.backlog-entry{padding:10px 14px;border-left:2px solid rgba(247,37,133,0.15);transition:border-color 0.2s;}
.backlog-entry:hover{border-left-color:rgba(247,37,133,0.5);}
.backlog-speaker{font-size:13px;letter-spacing:0.3em;margin-bottom:4px;color:var(--pink);}
.backlog-speaker.narration{color:var(--text-sub);font-style:italic;}
.backlog-text{font-size:15px;line-height:1.8;color:rgba(255,255,255,0.85);}
.backlog-choice{
  padding:8px 14px;border:1px solid rgba(247,37,133,0.25);border-radius:3px;
  font-size:12px;color:var(--gold);letter-spacing:0.1em;background:rgba(247,37,133,0.05);
}
.backlog-choice::before{content:'▶ ';}

/* ─── CHAPTER SELECT ─── */
#chapter-select-screen {
  position:fixed;inset:0;z-index:55;background:rgba(6,1,15,0.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.4s;padding:30px 20px;
}
#chapter-select-screen.visible{opacity:1;pointer-events:all;}
.chapter-select-title{
  font-family:'Shippori Mincho B1',serif;font-size:15px;letter-spacing:0.6em;
  color:var(--gold);text-shadow:var(--glow-gold);margin-bottom:24px;
}
.chapter-select-grid{

<script>
// ─────────────────────────────────────────────────
//  PARTICLE CANVAS
// ─────────────────────────────────────────────────
const bgCanvas = document.getElementById('bg-canvas');
const bCtx = bgCanvas.getContext('2d');
bgCanvas.width = window.innerWidth;
bgCanvas.height = window.innerHeight;

const bgParticles = Array.from({length:80}, () => ({
  x: Math.random() * bgCanvas.width,
  y: Math.random() * bgCanvas.height,
  r: Math.random() * 1.5 + 0.3,
  vy: -(Math.random() * 0.4 + 0.1),
  vx: (Math.random() - 0.5) * 0.2,
  o: Math.random(),
  color: Math.random() < 0.6 ? '#f72585' : (Math.random() < 0.5 ? '#ffd60a' : '#4cc9f0'),
  isStar: Math.random() < 0.25
}));

function drawBgStar(x,y,r,color,alpha) {
  bCtx.save();
  bCtx.globalAlpha = alpha;
  bCtx.translate(x,y);
  bCtx.fillStyle = color;
  bCtx.shadowColor = color;
  bCtx.shadowBlur = 6;
  bCtx.beginPath();
  for(let i=0;i<5;i++){
    const a1 = (i*Math.PI*2/5) - Math.PI/2;
    const a2 = a1 + Math.PI/5;
    if(i===0) bCtx.moveTo(Math.cos(a1)*r*2, Math.sin(a1)*r*2);
    else bCtx.lineTo(Math.cos(a1)*r*2, Math.sin(a1)*r*2);
    bCtx.lineTo(Math.cos(a2)*r*0.8, Math.sin(a2)*r*0.8);
  }
  bCtx.closePath();
  bCtx.fill();
  bCtx.restore();
}

function animateBg() {
  bCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  bgParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.o -= 0.002;
    if(p.o <= 0 || p.y < -10) {
      p.x = Math.random()*bgCanvas.width;
      p.y = bgCanvas.height + 10;
      p.o = Math.random() * 0.6 + 0.1;
    }
    if(p.isStar) { drawBgStar(p.x,p.y,p.r,p.color,p.o*0.7); }
    else {
      bCtx.globalAlpha = p.o*0.5;
      bCtx.fillStyle = p.color;
      bCtx.shadowColor = p.color;
      bCtx.shadowBlur = 4;
      bCtx.beginPath();
      bCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
      bCtx.fill();
    }
  });
  requestAnimationFrame(animateBg);
}
animateBg();

window.addEventListener('resize', () => {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
});

// ─────────────────────────────────────────────────
//  SCENE BACKGROUNDS
// ─────────────────────────────────────────────────
const SCENES = {
  title:   'radial-gradient(ellipse at 30% 60%, #1a0030 0%, #06010f 70%)',
  town:    'radial-gradient(ellipse at 50% 30%, #0d1a2e 0%, #06010f 80%)',
  night:   'radial-gradient(ellipse at 20% 80%, #0a001f 0%, #06010f 70%)',
  forest:  'radial-gradient(ellipse at 60% 40%, #001a0a 0%, #06010f 75%)',
  magic:   'radial-gradient(ellipse at 50% 50%, #1a0030 0%, #06010f 60%)',
  danger:  'radial-gradient(ellipse at 50% 20%, #1f0010 0%, #06010f 65%)',
  dark:    'radial-gradient(ellipse at 50% 80%, #0f000f 0%, #06010f 80%)',
  sacred:  'radial-gradient(ellipse at 50% 50%, #1a1200 0%, #06010f 70%)',
  void:    '#020006',
};

function setScene(key) {
  const bg = document.getElementById('scene-bg');
  bg.style.background = SCENES[key] || SCENES.night;
}

// ─────────────────────────────────────────────────
//  TEXT TYPEWRITER
// ─────────────────────────────────────────────────
let typeTimeout = null;
let isTyping = false;
let currentFullText = '';
let currentDisplayIndex = 0;

function typeText(text, speed = 30) {
  clearTimeout(typeTimeout);
  isTyping = true;
  currentFullText = text;
  currentDisplayIndex = 0;
  const el = document.getElementById('dialogue-text');
  el.innerHTML = '';

  function type() {
    if (currentDisplayIndex < currentFullText.length) {
      el.innerHTML = currentFullText.substring(0, ++currentDisplayIndex);
      typeTimeout = setTimeout(type, speed);
    } else {
      isTyping = false;
    }
  }
  type();
}

function finishTyping() {
  clearTimeout(typeTimeout);
  isTyping = false;
  document.getElementById('dialogue-text').innerHTML = currentFullText;
  currentDisplayIndex = currentFullText.length;
}

// ─────────────────────────────────────────────────
//  CHARACTER DISPLAY
// ─────────────────────────────────────────────────
function showChar(side, emoji, name, speaking=false) {
  const fig = document.getElementById(`char-${side}`);
  document.getElementById(`char-${side}-emoji`).textContent = emoji;
  document.getElementById(`char-${side}-name`).textContent = name;
  fig.classList.remove('hidden');
  fig.classList.add('visible');
  if (speaking) {
    fig.classList.add('speaking');
    const other = side === 'left' ? 'right' : 'left';
    const otherFig = document.getElementById(`char-${other}`);
    if (otherFig.classList.contains('visible')) otherFig.classList.add('dim');
    fig.classList.remove('dim');
  }
}

function hideChar(side) {
  document.getElementById(`char-${side}`).classList.remove('visible','speaking','dim');
}

function hideAllChars() {
  ['left','right'].forEach(s => hideChar(s));
}

function setSpeaking(side) {
  ['left','right'].forEach(s => {
    const f = document.getElementById(`char-${s}`);
    if (f.classList.contains('visible')) {
      if (s === side) { f.classList.add('speaking'); f.classList.remove('dim'); }
      else { f.classList.remove('speaking'); f.classList.add('dim'); }
    }
  });
}

function bothSpeak() {
  ['left','right'].forEach(s => {
    const f = document.getElementById(`char-${s}`);
    f.classList.remove('dim','speaking');
  });
}

// ─────────────────────────────────────────────────
//  FLASH EFFECT
// ─────────────────────────────────────────────────
function flash(color='#ffffff', duration=300) {
  const fl = document.getElementById('flash-overlay');
  fl.style.background = color;
  fl.style.animation = `screen-flash ${duration}ms ease`;
  fl.style.opacity = '1';
  setTimeout(() => { fl.style.opacity = '0'; fl.style.animation = ''; }, duration);
}

function glitchEffect() {
  const db = document.getElementById('dialogue-box');
  db.classList.add('glitch');
  setTimeout(() => db.classList.remove('glitch'), 350);
}

// ─────────────────────────────────────────────────
//  CHAPTER TITLE
// ─────────────────────────────────────────────────
function showChapterTitle(num, title, cb) {
  const ov = document.getElementById('chapter-overlay');
  document.getElementById('chapter-num-text').textContent = num;
  document.getElementById('chapter-title-text').textContent = title;
  document.getElementById('chapter-indicator').textContent = title;
  ov.classList.add('visible');
  waitingChoice = true;  // advance()をブロック
  setTimeout(() => {
    ov.classList.remove('visible');
    setTimeout(() => {
      waitingChoice = false;
      cb();
    }, 700);
  }, 2200);
}

// ─────────────────────────────────────────────────
//  DIALOGUE ENGINE
// ─────────────────────────────────────────────────
let script = [];
let scriptIndex = 0;
let waitingChoice = false;
let skipMode = false;

function setDialogue(speaker, text, speakerColor='') {
  const nameEl = document.getElementById('speaker-name');
  nameEl.textContent = speaker;
  nameEl.style.color = speakerColor || 'var(--pink)';
  nameEl.style.textShadow = speakerColor ? `0 0 20px ${speakerColor}88` : 'var(--glow-pink)';
  addLog(speaker, text, 'dialogue', speakerColor);
  typeText(text, skipMode ? 0 : 30);
}

function setNarration(text) {
  document.getElementById('speaker-name').textContent = '';
  document.getElementById('speaker-name').style.color = '';
  addLog('', text, 'narration');
  typeText(text, skipMode ? 0 : 25);
}

function showChoices(choices) {
  waitingChoice = true;
  document.getElementById('dialogue-box').style.pointerEvents = 'none';
  const wrap = document.getElementById('choice-wrap');
  const container = document.getElementById('choice-container');
  container.innerHTML = '';

  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.text;
    btn.onclick = () => {
      addLog('', c.text, 'choice');
      wrap.classList.remove('visible');
      waitingChoice = false;
      document.getElementById('dialogue-box').style.pointerEvents = '';
      setTimeout(() => {
        const ns = typeof c.next === 'function' ? c.next() : c.next;
        if (ns === null || ns === undefined) {
          runNext();
        } else if (Array.isArray(ns)) {
          script.splice(scriptIndex, 0, ...ns);
          runScript();
        } else {
          script = ns;
          for (const [k, v] of Object.entries(SCRIPT_MAP)) {
            if (v === ns) { currentScriptName = k; break; }
          }
          scriptIndex = 0;
          runScript();
        }
      }, 400);
    };
    container.appendChild(btn);
  });

  setTimeout(() => wrap.classList.add('visible'), 100);
}

function showEnding(type, title, body) {
  const es = document.getElementById('ending-screen');
  const typeLabel = document.getElementById('ending-type-label');
  const titleEl = document.getElementById('ending-title-text');
  const bodyEl = document.getElementById('ending-body-text');

  const labels = { true: 'TRUE ENDING', bad: 'BAD ENDING', normal: 'ENDING' };
  typeLabel.textContent = labels[type] || 'ENDING';
  titleEl.textContent = title;
  titleEl.className = `ending-title ${type}`;
  bodyEl.textContent = body;

  setTimeout(() => { es.classList.add('visible'); }, 300);
}

// ─────────────────────────────────────────────────
//  SCRIPT RUNNER
// ─────────────────────────────────────────────────
function runScript() {
  if (scriptIndex >= script.length) return;
  const node = script[scriptIndex];

  switch(node.type) {
    case 'scene': setScene(node.bg); runNext(); break;
    case 'show': showChar(node.side, node.emoji, node.name, node.speaking !== false); runNext(); break;
    case 'hide': hideChar(node.side); runNext(); break;
    case 'hideAll': hideAllChars(); runNext(); break;
    case 'speak': setSpeaking(node.side); runNext(); break;
    case 'both': bothSpeak(); runNext(); break;
    case 'flash': flash(node.color, node.dur); runNext(); break;
    case 'glitch': glitchEffect(); runNext(); break;
    case 'chapter':
      showChapterTitle(node.num, node.title, () => { runNext(); });
      break;
    case 'dialogue':
      setDialogue(node.speaker, node.text, node.color);
      break;
    case 'narration':
      setNarration(node.text);
      break;
    case 'choice':
      showChoices(node.choices);
      break;
    case 'ending':
      showEnding(node.endType, node.title, node.body);
      break;
    default: runNext();
  }
}

function runNext() {
  scriptIndex++;
  runScript();
}

function advance() {
  if (waitingChoice) return;
  if (isTyping) { finishTyping(); return; }
  scriptIndex++;
  if (skipMode) {
    setTimeout(runScript, 20);
  } else {
    runScript();
  }
}

function skipDialogue() {
  skipMode = !skipMode;
  document.getElementById('btn-skip').style.color = skipMode ? 'var(--pink)' : '';
}

// ─────────────────────────────────────────────────

// ─────────────────────────────────────────────────
//  SAVE / LOAD SYSTEM
// ─────────────────────────────────────────────────
const SAVE_SLOTS = 3;
let saveData = {};

function initSaveSystem() {
  try { const raw = localStorage.getItem('mahoiku_saves'); saveData = raw ? JSON.parse(raw) : {}; }
  catch(e) { saveData = {}; }
  updateSaveUI();
}

function saveGame(slot) {
  const chapterText = document.getElementById('chapter-indicator').textContent;
  const dialogueText = document.getElementById('dialogue-text').textContent.slice(0, 28);
  saveData[slot] = { scriptName: currentScriptName, index: scriptIndex,
    chapter: chapterText, preview: dialogueText || '…',
    date: new Date().toLocaleString('ja-JP', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) };
  try { localStorage.setItem('mahoiku_saves', JSON.stringify(saveData)); } catch(e) {}
  updateSaveUI();
  showNotification('セーブしました（スロット' + slot + '）');
}

function loadGame(slot) {
  const d = saveData[slot];
  if (!d) { showNotification('セーブデータがありません'); return; }
  const target = SCRIPT_MAP[d.scriptName];
  if (!target) { showNotification('セーブデータが壊れています'); return; }
  script = target; currentScriptName = d.scriptName; scriptIndex = d.index;
  hideAllChars(); closeSavePanel(); runScript();
  showNotification('ロードしました');
}

function showNotification(msg) {
  let el = document.getElementById('save-notification');
  if (!el) {
    el = document.createElement('div'); el.id = 'save-notification';

function updateSaveUI() {

    const d = saveData[i]; const slotEl = document.getElementById('save-slot-' + i);
    if (!slotEl) continue;
    if (d) {
      slotEl.querySelector('.slot-chapter').textContent = d.chapter || '？';
      slotEl.querySelector('.slot-preview').textContent = d.preview || '…';
      slotEl.querySelector('.slot-date').textContent = d.date || '';
      slotEl.querySelector('.slot-load').disabled = false;
    } else {
      slotEl.querySelector('.slot-chapter').textContent = '空きスロット';
      slotEl.querySelector('.slot-preview').textContent = '';
      slotEl.querySelector('.slot-date').textContent = '';

function openSavePanel(mode) {
  const panel = document.getElementById('save-panel');

  for (let i = 1; i <= SAVE_SLOTS; i++) {

  panel.classList.add('visible');
