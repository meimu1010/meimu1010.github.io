<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="魔法少女育成計画 〜キャンディー争奪戦〜">
    <meta property="og:description" content="最下位は消される！魔法少女として生き残るため、ライバルとキャンディーを奪い合え。君の魔法で勝利をつかめ！">
    <meta property="og:image" content="https://i.imgur.com/UsYk5Jo.png">
    <title>魔法少女育成計画 〜キャンディー争奪戦〜</title>
    <style>
        :root {
            --pastel-pink: #ffd1dc;
            --deep-pink: #ff1493;
            --black: #0d0609;
            --blood-red: #8a0303;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--black);
            color: var(--pastel-pink);
            font-family: 'MS Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
        }

        #game-container {
            width: min(1000px, 100vw);
            height: min(620px, 100vh);
            background: linear-gradient(180deg, #1a0b12 0%, #000000 100%);
            border: 2px solid var(--deep-pink);
            box-shadow: 0 0 40px rgba(255,20,147,0.35), inset 0 0 60px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.18) 50%),
                linear-gradient(90deg, rgba(255,0,0,0.04), rgba(0,255,0,0.015), rgba(0,255,0,0.04));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* ======== レイアウト ======== */
        #game-body { flex: 1; display: flex; overflow: hidden; }

        #game-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,20,147,0.4);
            min-width: 0;
        }

        /* ======== ステータスバー ======== */
        #status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 18px;
            background: rgba(255,20,147,0.12);
            border-bottom: 1px solid rgba(255,20,147,0.4);
            font-size: 1rem;
            flex-shrink: 0;
        }

        /* ======== チートUI ======== */
        #cheat-ui {
            display: none;
            padding: 5px 12px;
            background: rgba(100,0,0,0.4);
            border-bottom: 1px solid #cc0000;
            align-items: center;
            gap: 10px;
            color: #ff6666;
            font-size: 0.8rem;
            font-weight: bold;
            flex-shrink: 0;
        }
        #cheat-ui.active { display: flex; }
        .cheat-input {
            width: 70px; background: #000; color: #0f0;
            border: 1px solid #cc0000; padding: 2px 5px; font-family: monospace;
        }
        .cheat-btn {
            background: #300; border: 1px solid #cc0000; color: #f88;
            padding: 2px 8px; cursor: pointer; font-family: inherit; font-size: 0.8rem;
        }
        .cheat-btn:hover { background: #600; }
        .cheat-btn.kill-on { background: #600; color: #fff; border-color: #f00; }

        /* ======== メインビュー ======== */
        #main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
            overflow: hidden;
            gap: 10px;
        }

        #message-window {
            background: rgba(255,209,220,0.07);
            border: 1px solid rgba(255,20,147,0.5);
            padding: 16px 18px;
            min-height: 90px;
            font-size: 1.1rem;
            line-height: 1.75;
            flex-shrink: 0;
        }

        /* ======== 選択肢 ======== */
        #choices-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            max-height: 250px;
        }
        #choices-container.murder-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            max-height: none;
        }

        .choice-btn {
            background: rgba(0,0,0,0.6);
            color: var(--pastel-pink);
            border: 1px solid rgba(255,209,220,0.35);
            padding: 10px 14px;
            cursor: pointer;
            text-align: left;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .choice-btn:hover:not(:disabled) {
            background: var(--deep-pink);
            border-color: #fff;
            color: #fff;
        }
        .choice-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .target-btn {
            padding: 8px 4px !important;
            font-size: 0.75rem !important;
            text-align: center !important;
            line-height: 1.3 !important;
        }

        /* ======== スピードバー ======== */
        #speed-ctrl {
            padding: 5px 18px;
            background: rgba(0,0,0,0.4);
            font-size: 0.8rem;
            display: flex;
            gap: 15px;
            align-items: center;
            border-top: 1px solid #222;
            flex-shrink: 0;
        }
        .vol-slider {
            width: 70px; height: 4px; accent-color: var(--deep-pink); cursor: pointer; vertical-align: middle;
        }

        /* ======== ランキングパネル ======== */
        #ranking-panel {
            width: 220px;
            background: rgba(13,6,9,0.85);
            padding: 12px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .ranking-title {
            text-align: center;
            border-bottom: 1px solid rgba(255,209,220,0.3);
            padding-bottom: 6px;
            margin-bottom: 8px;
            color: var(--deep-pink);
            font-weight: bold;
            font-size: 0.9rem;
        }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 0.8rem;
            padding: 2px 0;
        }
        .ranking-item.player {
            color: #fff;
            text-shadow: 0 0 6px var(--deep-pink);
            font-weight: bold;
        }
        .ranking-item.last-place { color: #ff4444; animation: blink-red 1s infinite; }
        @keyframes blink-red { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* ======== セットアップ ======== */
        #setup-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #150610 0%, #000 100%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 40px;
            overflow-y: auto;
        }
        #setup-screen h1 {
            color: var(--deep-pink); font-size: 1.5rem; margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255,20,147,0.6); text-align: center;
        }
        .setup-group { margin-bottom: 16px; text-align: center; width: 100%; }
        .setup-group p { margin-bottom: 8px; font-size: 0.9rem; }
        .char-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
            margin-top: 8px; max-height: 180px; overflow-y: auto;
            padding: 8px; border: 1px solid #333;
        }
        .setup-btn {
            background: #000; border: 1px solid rgba(255,209,220,0.4); color: var(--pastel-pink);
            padding: 5px 8px; cursor: pointer; font-size: 0.78rem; font-family: inherit; transition: background 0.15s;
        }
        .setup-btn:hover { background: rgba(255,20,147,0.3); }
        .setup-btn.active { background: var(--deep-pink); color: #fff; border-color: #fff; }
        .difficulty-btn { padding: 6px 12px; font-size: 0.85rem; margin: 0 4px; }
        .start-btn {
            padding: 14px 45px; font-size: 1.4rem; background: var(--deep-pink); color: #fff;
            border: none; cursor: pointer; margin-top: 16px; font-family: inherit;
            text-shadow: 0 0 8px rgba(255,255,255,0.5); transition: box-shadow 0.2s;
        }
        .start-btn:hover { box-shadow: 0 0 20px rgba(255,20,147,0.8); }

        /* ======== ファヴポップアップ ======== */
        #fav-popup {
            position: absolute; top: 50%; left: 40%;
            transform: translate(-50%, -50%);
            width: 52%; background: rgba(5,0,8,0.97);
            border: 2px dashed var(--pastel-pink);
            padding: 22px 24px; text-align: center;
            display: none; z-index: 150; line-height: 1.75; font-size: 1rem;
        }
        #fav-popup .fav-icon { font-size: 2rem; margin-bottom: 8px; }
        #fav-popup button {
            margin-top: 14px; background: transparent;
            border: 1px solid var(--pastel-pink); color: var(--pastel-pink);
            padding: 6px 20px; cursor: pointer; font-family: inherit;
        }
        #fav-popup button:hover { background: var(--pastel-pink); color: #000; }

        /* ======== エンド画面 ======== */
        #end-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.93); z-index: 180;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 30px;
        }
        #end-screen.visible { display: flex; }
        #end-title { font-size: 3rem; margin-bottom: 16px; }
        #end-body  { font-size: 1.05rem; line-height: 1.9; max-width: 600px; }
        .restart-btn {
            background: transparent; color: #fff; border: 1px solid #fff;
            padding: 10px 24px; cursor: pointer; font-family: inherit;
            margin-top: 20px; font-size: 1rem;
        }
        .restart-btn:hover { background: #fff; color: #000; }

        /* ======== アニメーション ======== */
        @keyframes flashRed {
            0%   { box-shadow: inset 0 0 0 var(--blood-red); }
            50%  { box-shadow: inset 0 0 80px var(--blood-red); background-color: rgba(138,3,3,0.35); }
            100% { box-shadow: inset 0 0 0 var(--blood-red); }
        }
        .flash-red-anim { animation: flashRed 0.3s 3; }

        @keyframes glitch {
            0%,100% { transform:translate(0); filter:none; }
            20%     { transform:translate(-2px,2px);  filter:hue-rotate(90deg); }
            40%     { transform:translate(2px,-2px);  filter:hue-rotate(-90deg); }
        }
        .glitch-anim { animation: glitch 0.2s linear infinite; }
    </style>
</head>
<body>
<audio id="bgm-audio" src="bgm.mp3" loop></audio>

<div id="game-container">
    <div class="scanlines"></div>

    <!-- セットアップ -->
    <div id="setup-screen">
        <h1>魔法少女育成計画<br>〜キャンディー争奪戦〜</h1>
        <div class="setup-group">
            <p>難易度を選択してぽん：</p>
            <button class="setup-btn difficulty-btn" onclick="setDifficulty('easy',this)">イージー（激甘）</button>
            <button class="setup-btn difficulty-btn active" onclick="setDifficulty('normal',this)">ノーマル</button>
            <button class="setup-btn difficulty-btn" onclick="setDifficulty('hard',this)">ハード（絶望）</button>
            <button class="setup-btn difficulty-btn" onclick="setDifficulty('veryhard',this)">ベリーハード（地獄）</button>
        </div>
        <div class="setup-group">
            <p>操作する魔法少女を選んでぽん：</p>
            <div id="char-selection" class="char-grid"></div>
        </div>
        <button class="start-btn" onclick="startGame()">契約するぽん！</button>
    </div>

    <!-- ゲーム本体 -->
    <div id="status-bar">
        <span>🍬 <strong id="candy-display">50</strong></span>
        <span>🧚 生存: <strong id="survivor-display">16</strong>/16</span>
        <span>⏱ 第<strong id="week-display">1</strong>週 <strong id="day-display">月</strong>曜</span>
    </div>

    <div id="cheat-ui">
        <span>[CHEAT]</span>
        🍬<input type="number" id="cheat-candy" class="cheat-input" value="999">
        <button class="cheat-btn" onclick="applyCandyCheat()">飴変更</button>
        <button id="kill-cheat-btn" class="cheat-btn" onclick="toggleKillCheat()">殺害確定: OFF</button>
    </div>

    <div id="game-body">
        <div id="game-main">
            <div id="main-view">
                <div id="message-window">…</div>
                <div id="choices-container"></div>
            </div>
            <div id="speed-ctrl">
                難易度: <span id="mode-display">NORMAL</span> |
                <label><input type="checkbox" id="speed-toggle" onchange="toggleSpeed()"> 2倍速</label> |
                <label><input type="checkbox" id="bgm-toggle" checked onchange="updateBGM()"> BGM</label>
                <input type="range" class="vol-slider" id="vol-slider" min="0" max="1" step="0.01" value="0.5" oninput="updateBGM()">
            </div>
        </div>
        <div id="ranking-panel">
            <div class="ranking-title">🍬 キャンディー所持数</div>
            <div id="ranking-list"></div>
        </div>
    </div>

    <!-- ファヴポップアップ -->
    <div id="fav-popup">
        <div class="fav-icon">🧚</div>
        <div id="fav-message"></div>
        <button onclick="closeFav()">分かったぽん</button>
    </div>

    <!-- エンド画面 -->
    <div id="end-screen">
        <div id="end-title"></div>
        <div id="end-body"></div>
        <button class="restart-btn" onclick="location.reload()">タイトルに戻る</button>
    </div>
</div>

<script>
/* ============================================================
   定数
============================================================ */
const DAYS         = ["月","火","水","木","金"];
const DAYS_PER_WEEK = 5;
const PLAYER_START  = 50;
const NPC_START_MIN = 35;
const NPC_START_MAX = 65;
const MURDER_CHANCE = 0.12;

// 難易度別 NPC 1日獲得飴量 (min, max)
const DIFF_NPC = {
    easy:     [2,  8 ],
    normal:   [4,  14],
    hard:     [8,  22],
    veryhard: [14, 35]
};

/* ============================================================
   キャラクターデータ
============================================================ */
const CHARACTER_LIST = [
    { name:"ハードゴア・アリス",         magic:"どんな怪我をしてもすぐに治る" },

    { name:"マジカルロイド44",           magic:"未来の便利な道具を毎日一つ出せる" },
    { name:"ユナエル",                   magic:"好きな生き物に変身できる" },
    { name:"ミナエル",                   magic:"好きな物（無機物）に変身できる" },
    { name:"たま",                       magic:"色んなものに素早く穴を開けられる" },
    { name:"ねむりん",                   magic:"他人の夢の中に入ることができる" },
    { name:"ルーラ",                     magic:"目の前の相手にどんな命令でも聞かせられる" },
    { name:"スイムスイム",               magic:"どんなものにでも水みたいに潜り込める" },
    { name:"森の音楽家クラムベリー",     magic:"音を自由自在に操ることができる" },
    { name:"シスター・ナナ",             magic:"好きな人の能力を飛躍的に高める" },
    { name:"ヴェス・ウィンタープリズン", magic:"何もないところに壁を作り出せる" }

/* ============================================================
   コモンイベント（原作アニメ雰囲気・全面再生成）
============================================================ */
const COMMON_EVENTS = [
    {
        text:"深夜の繁華街で酔い潰れた人が倒れている。このまま放置すれば命に関わるかもしれない。",
        choices:[
            {text:"魔法で介抱し、安全な場所へ運ぶ",    candy:18, msg:"翌朝その人が魔法少女の噂を広め、感謝の飴が集まった。"},
            {text:"様子だけ確認して立ち去る",           candy:3,  msg:"見捨てたわけではないが、良心が少し痛む。"},
            {text:"財布から飴を抜き取って去る",         candy:30, msg:"飴は手に入ったが、胸の奥に黒いものが溜まった気がした。"}
        ]
    },
    {
        text:"ファヴから緊急連絡が入った。「今夜だけ飴の獲得量が2倍になるぽん。理由は聞かないでほしいぽん」",

    {

            {text:"治療して助ける",                     candy:-15, msg:"恩義を売った。後で庇護に繋がるかもしれない。"},

    {

/* ============================================================
   ゲーム状態
============================================================ */
const state = {
    candies: PLAYER_START,
    week: 1,
    dayIndex: 0,
    survivors: 16,
    playerName: "",
    magicName: "",
    isGameOver: false,
    gameSpeed: 1,
    difficulty: 'normal',
    npcScores: {},
    cheatClickCount: 0,
    cheatUnlocked: false,
    forceMurder: false,
    isTyping: false
};
let npcList = [];

/* ============================================================
   ユーティリティ
============================================================ */
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

/* ============================================================
   BGM
============================================================ */
function updateBGM() {
    const audio = document.getElementById('bgm-audio');
    const on  = document.getElementById('bgm-toggle').checked;
    const vol = parseFloat(document.getElementById('vol-slider').value);
    audio.volume = vol;
    if (on) { audio.play().catch(() => {}); }
    else    { audio.pause(); }
}

/* ============================================================
   セットアップ
============================================================ */
window.onload = () => {
    const grid = document.getElementById('char-selection');
    CHARACTER_LIST.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'setup-btn';
        btn.textContent = c.name;
        btn.onclick = () => selectChar(i, btn);
        grid.appendChild(btn);
    });
    const ri = rand(0, CHARACTER_LIST.length - 1);
    selectChar(ri, grid.children[ri]);
};

function selectChar(idx, btn) {
    document.querySelectorAll('#char-selection .setup-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.playerName = CHARACTER_LIST[idx].name;
    state.magicName  = CHARACTER_LIST[idx].magic;
}

function setDifficulty(diff, btn) {
    document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.difficulty = diff;
    document.getElementById('mode-display').textContent = diff.toUpperCase();

    if (diff === 'normal') {
        state.cheatClickCount++;
        if (state.cheatClickCount >= 5) {
            state.cheatUnlocked = true;
            alert("チートモードが解放されたぽん！");
        }
    } else {
        state.cheatClickCount = 0;
    }
}

function startGame() {
    document.getElementById('setup-screen').style.display = 'none';
    if (state.cheatUnlocked) {
        document.getElementById('cheat-ui').classList.add('active');
    }
    npcList = CHARACTER_LIST.filter(c => c.name !== state.playerName).map(c => c.name);
    npcList.forEach(name => { state.npcScores[name] = rand(NPC_START_MIN, NPC_START_MAX); });

    updateBGM();
    updateUI();
    updateRanking();

    showFav(
        `ようこそ、${state.playerName}！<br>
        君の魔法は『${state.magicName}』だぽん。<br>
        毎週金曜の集計で最下位になった子は消去されるぽん。<br>
        頑張って飴を集めるぽん！`,
        startTurn
    );
}

/* ============================================================
   UI更新
============================================================ */
function updateUI() {
    document.getElementById('candy-display').textContent    = state.candies;
    document.getElementById('survivor-display').textContent = state.survivors;
    document.getElementById('week-display').textContent     = state.week;
    document.getElementById('day-display').textContent      = DAYS[state.dayIndex] ?? "?";
}

function updateRanking() {
    const list = document.getElementById('ranking-list');
    list.innerHTML = '';
    const all = npcList.map(n => ({ name: n, candies: state.npcScores[n], isPlayer: false }));
    all.push({ name: state.playerName, candies: state.candies, isPlayer: true });
    all.sort((a, b) => b.candies - a.candies);
    all.forEach((item, i) => {
        const isLast = i === all.length - 1;
        const div = document.createElement('div');
        div.className = `ranking-item${item.isPlayer ? ' player' : ''}${isLast ? ' last-place' : ''}`;
        div.innerHTML = `<span>${i + 1}. ${item.name}</span><span>${item.candies}🍬</span>`;
        list.appendChild(div);
    });
}

/* ============================================================
   タイプライター（タイプ中は選択肢を無効化）
============================================================ */
function typeWriter(html, elementId, callback) {
    const el = document.getElementById(elementId);
    el.innerHTML = '';
    state.isTyping = true;
    setChoicesEnabled(false);

    const text = html;
    let i = 0;
    const speed = Math.round(28 / state.gameSpeed);

    function type() {
        if (i < text.length) {
            el.innerHTML = text.substring(0, i + 1);
            i++;
            setTimeout(type, speed);
        } else {
            state.isTyping = false;
            setChoicesEnabled(true);
            if (callback) callback();
        }
    }
    type();
}

function setChoicesEnabled(enabled) {
    document.querySelectorAll('#choices-container .choice-btn').forEach(btn => {
        btn.disabled = !enabled;
    });
}

/* ============================================================
   ターン処理
============================================================ */
function startTurn() {
    if (state.isGameOver) return;
    if (state.dayIndex >= DAYS_PER_WEEK) { processFriday(); return; }

    updateUI();
    updateRanking();

    // NPC飴獲得
    const [dMin, dMax] = DIFF_NPC[state.difficulty];
    npcList.forEach(name => { state.npcScores[name] += rand(dMin, dMax); });

    // イベント抽選（コモン7割・MGイベント3割）
    const pool = Math.random() < 0.7 ? COMMON_EVENTS : MG_EVENTS;
    const ev   = pool[Math.floor(Math.random() * pool.length)];

    clearChoices();
    typeWriter(ev.text, 'message-window', () => {
        renderChoices(shuffle(ev.choices), choice => handleChoice(choice));
    });
}

function handleChoice(choice) {
    clearChoices();

    // クリティカル・不運はプラスの選択肢にのみ適用
    let mult = 1.0, prefix = '';
    if (choice.candy > 0) {
        const luck = Math.random();
        if (luck > 0.85)      { mult = 1.5; prefix = '【クリティカル！】 '; }
        else if (luck < 0.15) { mult = 0.5; prefix = '【不運……】 ';        }
    }

    const gained = Math.round(choice.candy * mult);
    state.candies += gained;
    state.dayIndex++;

    if (gained < 0) flashRed();

    const sign  = gained >= 0 ? '+' : '';
    const color = gained >= 0 ? '#aaffaa' : '#ff8888';
    typeWriter(
        `${prefix}${choice.msg}<br><span style="color:${color}">（飴: ${sign}${gained}）</span>`,
        'message-window',
        () => { setTimeout(startTurn, Math.round(1400 / state.gameSpeed)); }
    );
}

function renderChoices(choices, onSelect) {
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    container.classList.remove('murder-grid');
    choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = c.text;
        btn.onclick = () => onSelect(c);
        container.appendChild(btn);
    });
}

function clearChoices() {
    const c = document.getElementById('choices-container');
    c.innerHTML = '';
    c.classList.remove('murder-grid');
}

/* ============================================================
   週末集計（金曜処理）
============================================================ */
function processFriday() {
    const main = document.getElementById('game-main');
    main.classList.add('glitch-anim');
    setTimeout(() => {
        main.classList.remove('glitch-anim');
        doFridayLogic();
    }, Math.round(1800 / state.gameSpeed));
}

function doFridayLogic() {
    const all = npcList.map(n => ({ name: n, candies: state.npcScores[n], isPlayer: false }));
    all.push({ name: state.playerName, candies: state.candies, isPlayer: true });
    all.sort((a, b) => a.candies - b.candies);

    // 残り2人以下でゲーム終了
    if (all.length <= 2) { endGameFinal(all); return; }

    const victim = all[0];

    if (victim.isPlayer) {
        // プレイヤーが最下位
        showFav(
            `第${state.week}週の集計が終わったぽん。<br>最下位は……【${state.playerName}】だぽん。<br>規定により消去するぽん。さよならぽん。`,
            () => gameOver('最下位消去')
        );
        return;
    }

    // NPCが最下位
    removeNpc(victim.name);
    const baseMsg = `第${state.week}週の集計が終わったぽん。<br>最下位は【${victim.name}】だぽん。消去したぽん。`;

    // 殺害イベント判定
    const doMurder = state.forceMurder || Math.random() < MURDER_CHANCE;
    if (doMurder && npcList.length >= 1) {
        const remaining = [...npcList, state.playerName];
        const killer    = state.forceMurder
            ? state.playerName
            : remaining[Math.floor(Math.random() * remaining.length)];

        if (killer === state.playerName) {
            typeWriter(
                baseMsg + '<br>……おや。君の中に黒い衝動が湧き上がったぽん。誰を「処理」するぽん？',
                'message-window',
                () => renderMurderTargetButtons(baseMsg)
            );
        } else {
            const targets = remaining.filter(n => n !== killer);
            const target  = targets[Math.floor(Math.random() * targets.length)];
            executeMurder(killer, target, baseMsg);
        }
    } else {
        advanceWeek(baseMsg);
    }
}

function renderMurderTargetButtons(baseMsg) {
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    container.classList.add('murder-grid');
    npcList.forEach(targetName => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn target-btn';
        btn.textContent = `【殺害】${targetName}`;
        btn.onclick = () => {
            container.classList.remove('murder-grid');
            executeMurder(state.playerName, targetName, baseMsg);
        };
        container.appendChild(btn);
    });
}

function executeMurder(killer, target, baseMsg) {
    clearChoices();
    const murderMsg = `${baseMsg}<br>その後……【${killer}】が【${target}】を殺害したぽん！`;

    if (target === state.playerName) {
        showFav(murderMsg + '<br>君が標的になってしまったぽん……。', () => gameOver('殺害'));
        return;
    }

    removeNpc(target);
    const survivorsNow = npcList.length + 1;

    if (survivorsNow <= 2) {
        const finalAll = npcList.map(n => ({ name: n, isPlayer: false, candies: state.npcScores[n] }));
        finalAll.push({ name: state.playerName, isPlayer: true, candies: state.candies });
        showFav(murderMsg + `<br>残りは${survivorsNow}名になったぽん。ここで終了だぽん。`, () => endGameFinal(finalAll));
    } else {
        advanceWeek(murderMsg);
    }
}

function removeNpc(name) {
    npcList = npcList.filter(n => n !== name);
    delete state.npcScores[name];
    state.survivors--;
    updateUI();
    updateRanking();
}

function advanceWeek(msg) {
    state.week++;
    state.dayIndex = 0;
    showFav(msg + `<br>来週も飴を集めるぽん！`, startTurn);
}

/* ============================================================
   エンディング
============================================================ */
function endGameFinal(finalList) {
    state.isGameOver = true;
    finalList.sort((a, b) => b.candies - a.candies);

    const playerPos = finalList.findIndex(f => f.isPlayer) + 1;
    let endMsg = '';

    if (playerPos === 1) {
        endMsg = `君が最後まで生き残り、最多キャンディーを保有したぽん！<br>本当に……おめでとうぽん。`;
    } else {
        const names = finalList.map(f => f.name).join('、');
        endMsg = `残りの魔法少女: ${names}<br>君は第${playerPos}位で終了だぽん。`;
    }

    showEndScreen(
        'GAME END',
        `第${state.week}週をもってゲーム終了ぽん。<br>${endMsg}<br><br>
        最終キャンディー数: <strong>${state.candies}🍬</strong><br>
        生存週数: <strong>${state.week - 1}週</strong>`
    );
}

function gameOver(reason) {
    state.isGameOver = true;
    const reasonText = reason === '殺害'
        ? 'あなたは別の魔法少女に殺害されました。'
        : 'あなたは最下位になり、消去されました。';
    showEndScreen(
        'SYSTEM PURGE',
        `${reasonText}<br>魔法少女としての記録は全て消去されます。<br><br>
        最終キャンディー数: <strong>${state.candies}🍬</strong><br>
        生存週数: <strong>${state.week - 1}週</strong>`
    );
}

function showEndScreen(title, body) {
    const screen = document.getElementById('end-screen');
    document.getElementById('end-title').innerHTML = title;
    document.getElementById('end-body').innerHTML  = body;
    screen.classList.add('visible');
    if (title === 'SYSTEM PURGE') {
        document.getElementById('end-title').style.color = '#ff2222';
        document.getElementById('end-title').classList.add('glitch-anim');
    } else {
        document.getElementById('end-title').style.color = 'var(--pastel-pink)';
    }
}

/* ============================================================
   ファヴポップアップ
============================================================ */
function showFav(msg, cb) {
    document.getElementById('fav-message').innerHTML = msg;
    document.getElementById('fav-popup').style.display = 'block';
    window._favCb = cb;
}
function closeFav() {
    document.getElementById('fav-popup').style.display = 'none';
    if (window._favCb) { window._favCb(); window._favCb = null; }
}

/* ============================================================
   演出
============================================================ */
function flashRed() {
    const m = document.getElementById('game-main');
    m.classList.remove('flash-red-anim');
    void m.offsetWidth;
    m.classList.add('flash-red-anim');
}

/* ============================================================
   速度・チート
============================================================ */
function toggleSpeed() {
    state.gameSpeed = document.getElementById('speed-toggle').checked ? 2 : 1;
}
function applyCandyCheat() {
    const val = parseInt(document.getElementById('cheat-candy').value, 10);
    if (!isNaN(val)) { state.candies = val; updateUI(); updateRanking(); }
}
function toggleKillCheat() {
    state.forceMurder = !state.forceMurder;
    const btn = document.getElementById('kill-cheat-btn');
    btn.textContent = `殺害確定: ${state.forceMurder ? 'ON' : 'OFF'}`;
    btn.classList.toggle('kill-on', state.forceMurder);
}
