<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicode 検字盤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --ink-faint: #4a3f2f;
    --ink-ghost: #8a7a64;
    --paper: #f5f0e8;
    --paper-warm: #ede6d5;
    --paper-deep: #d8cdb8;
    --red: #8b1a1a;
    --red-light: #c0392b;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --rule: #c8bca8;
    --rule-dark: #a09080;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 27px,
        rgba(160,144,128,0.12) 27px,
        rgba(160,144,128,0.12) 28px
      );
  }

  /* ── HEADER ── */
  header {
    border-bottom: 2px solid var(--ink);
    padding: 2rem 3rem 1.2rem;
    position: relative;
    background: var(--paper-warm);
  }

  header::after {
    content: '';
    display: block;
    height: 1px;
    background: var(--rule-dark);
    margin-top: 6px;
  }

  .header-inner {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  h1 {
    font-family: 'IM Fell English', serif;
    font-size: 2.2rem;
    font-weight: 400;
    letter-spacing: .04em;
    color: var(--ink);
    line-height: 1;
  }

  .title-ja {
    font-family: 'Noto Serif JP', serif;
    font-size: .85rem;
    color: var(--ink-faint);
    letter-spacing: .15em;
    padding-left: 2px;
  }

  .stamp {
    margin-left: auto;
    border: 2px solid var(--red);
    padding: 4px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
    color: var(--red);
    letter-spacing: .12em;
    text-transform: uppercase;
    transform: rotate(-1.5deg);
    display: inline-block;
  }

  /* ── INPUT AREA ── */
  .input-section {
    padding: 1.8rem 3rem 1.2rem;
    border-bottom: 1px solid var(--rule);
    background: var(--paper-warm);
  }

  .input-label {
    font-size: .7rem;
    letter-spacing: .2em;
    color: var(--ink-ghost);
    text-transform: uppercase;
    margin-bottom: .5rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .input-row {
    display: flex;
    gap: 0;
    align-items: stretch;
    border: 1.5px solid var(--ink);
    border-radius: 0;
    overflow: hidden;
    max-width: 680px;
  }

  #txt {
    flex: 1;
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    padding: .65rem 1rem;
    border: none;
    background: #fff;
    color: var(--ink);
    outline: none;
    min-width: 0;
    line-height: 1.5;
  }

  #txt::placeholder {
    color: var(--ink-ghost);
    font-style: italic;
  }

  #btn-clear {
    padding: 0 1.2rem;
    background: var(--ink);
    color: var(--paper);
    border: none;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: .72rem;
    letter-spacing: .1em;
    white-space: nowrap;
    transition: background .15s;
  }

  #btn-clear:hover { background: var(--ink-faint); }

  .meta-row {
    display: flex;
    gap: 1.5rem;
    margin-top: .6rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: .72rem;
    color: var(--ink-ghost);
  }

  .meta-row span { display: flex; align-items: center; gap: .3rem; }
  .meta-row strong { color: var(--ink-faint); }

  /* ── GRID ── */
  main {
    padding: 1.8rem 3rem 3rem;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }

  /* ── CARD ── */
  .card {
    background: #fff;
    border: 1px solid var(--rule-dark);
    position: relative;
    padding: 0;
    transition: box-shadow .15s, border-color .15s;
    overflow: hidden;
  }

  .card:hover {
    border-color: var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    z-index: 1;
  }

  .card-index {
    position: absolute;
    top: 5px;
    left: 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: .6rem;
    color: var(--ink-ghost);
    line-height: 1;
  }

  .card-glyph {
    font-size: 2.4rem;
    text-align: center;
    padding: 1rem .5rem .6rem;
    color: var(--ink);
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--paper-deep);
    background: var(--paper);
    line-height: 1;
  }

  .card-glyph.ctrl {
    font-family: 'JetBrains Mono', monospace;
    font-size: .75rem;
    color: var(--ink-ghost);
  }

  .card-info {
    padding: .5rem .6rem .4rem;
  }

  .card-codepoint {
    font-family: 'JetBrains Mono', monospace;
    font-size: .8rem;
    font-weight: 600;
    color: var(--red);
    letter-spacing: .04em;
    display: block;
    margin-bottom: 2px;
  }

  .card-dec {
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
    color: var(--ink-ghost);
    display: block;
    margin-bottom: 3px;
  }

  .card-name {
    font-size: .6rem;
    color: var(--ink-faint);
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: .4rem;
    letter-spacing: .02em;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
  }

  .copy-btn {
    width: 100%;
    padding: 5px 0;
    background: var(--paper-warm);
    border: none;
    border-top: 1px solid var(--paper-deep);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
    color: var(--ink-faint);
    letter-spacing: .08em;
    transition: background .12s, color .12s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .copy-btn:hover {
    background: var(--ink);
    color: var(--paper);
  }

  .copy-btn.copied {
    background: var(--gold);
    color: var(--paper);
    border-color: var(--gold);
  }

  .copy-btn svg {
    width: 10px;
    height: 10px;
    flex-shrink: 0;
  }

  /* ── EMPTY STATE ── */
  #empty {
    grid-column: 1 / -1;
    padding: 4rem 0;
    text-align: center;
    color: var(--ink-ghost);
    font-style: italic;
    font-size: .95rem;
    letter-spacing: .08em;
  }

  #empty small {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
    margin-top: .5rem;
    letter-spacing: .12em;
    text-transform: uppercase;
  }

  /* ── FOOTER RULE ── */
  footer {
    border-top: 2px solid var(--ink);
    padding: .8rem 3rem;
    background: var(--paper-warm);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  footer::before {
    content: '';
    display: block;
    height: 1px;
    background: var(--rule);
    margin-bottom: 0;
  }

  .footer-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
    color: var(--ink-ghost);
    letter-spacing: .1em;
  }

  .footer-divider {
    color: var(--rule-dark);
  }

  /* ── COPY ALL ── */
  #copy-all-btn {
    margin-left: auto;
    padding: 5px 14px;
    background: transparent;
    border: 1px solid var(--ink-faint);
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
    letter-spacing: .08em;
    cursor: pointer;
    transition: all .12s;
  }

  #copy-all-btn:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1>Unicode Inspector</h1>
      <div class="title-ja">文字　→　符号点　検字盤</div>
    </div>
    <div class="stamp">Unicode 15.1</div>
  </div>
</header>

<div class="input-section">
  <div class="input-label">▸ 解析する文字列を入力</div>
  <div class="input-row">
    <input id="txt" type="text" placeholder="ここに文字を入力…" autocomplete="off" spellcheck="false" />
    <button id="btn-clear">消去 ×</button>
  </div>
  <div class="meta-row">
    <span>文字数: <strong id="cnt-char">0</strong></span>
    <span>コードポイント: <strong id="cnt-cp">0</strong></span>
    <span>バイト(UTF-8): <strong id="cnt-byte">0</strong></span>
  </div>
</div>

<main>
  <div id="grid">
    <div id="empty">
      文字列を入力すると<br>ここに展開されます
      <small>— 1文字ずつ Unicode コードポイントを表示 —</small>
    </div>
  </div>
</main>

<footer>
  <span class="footer-text">Unicode Character Inspector</span>
  <span class="footer-divider footer-text">／</span>
  <span class="footer-text">1文字コピー対応</span>
  <button id="copy-all-btn">全てコピー ↓</button>
</footer>

function getName(cp) {
  if (NAMES[cp]) return NAMES[cp];
  if (cp >= 0x4E00 && cp <= 0x9FFF) return 'CJK UNIFIED IDEOGRAPH';
  if (cp >= 0xF900 && cp <= 0xFAFF) return 'CJK COMPATIBILITY IDEOGRAPH';
  if (cp >= 0x20000 && cp <= 0x2A6DF) return 'CJK EXTENSION B';
  if (cp >= 0x1F600 && cp <= 0x1F64F) return 'EMOTICONS';
  if (cp >= 0x1F300 && cp <= 0x1F5FF) return 'MISC SYMBOLS & PICTOGRAPHS';
  if (cp >= 0x1F900 && cp <= 0x1F9FF) return 'SUPPLEMENTAL SYMBOLS';
  if (cp >= 0x0080 && cp <= 0x00FF) return 'LATIN-1 SUPPLEMENT';
  if (cp >= 0x0100 && cp <= 0x017F) return 'LATIN EXTENDED-A';
  if (cp >= 0x0400 && cp <= 0x04FF) return 'CYRILLIC';
  if (cp >= 0x0600 && cp <= 0x06FF) return 'ARABIC';
  if (cp >= 0x3400 && cp <= 0x4DBF) return 'CJK EXTENSION A';
  if (cp >= 0xAC00 && cp <= 0xD7AF) return 'HANGUL SYLLABLE';
  return 'UNKNOWN';
}

function toUtf8Bytes(cp) {
  if (cp < 0x80) return 1;
  if (cp < 0x800) return 2;
  if (cp < 0x10000) return 3;
  return 4;
}

function isControl(cp) {
  return cp < 0x20 || (cp >= 0x7F && cp <= 0x9F);
}

function cpToHex(cp) {
  return 'U+' + cp.toString(16).toUpperCase().padStart(4, '0');
}

const CTRL_LABELS = {
  0x0009:'[TAB]',0x000A:'[LF]',0x000D:'[CR]',0x0020:'[SP]',0x00A0:'[NBSP]',
};

function getSegments(str) {
  const segs = [];
  const iter = str[Symbol.iterator]();
  let i = 0;
  for (const ch of str) {
    segs.push({ char: ch, index: i });
    i++;
  }
  return segs;
}

function render(str) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  const segs = getSegments(str);

  if (segs.length === 0) {
    grid.innerHTML = '';
    grid.appendChild(buildEmpty());
    updateMeta(str);
    return;
  }

  grid.innerHTML = '';

  segs.forEach((seg, i) => {
    const cp = seg.char.codePointAt(0);
    const hex = cpToHex(cp);
    const dec = cp;
    const name = getName(cp);
    const ctrl = isControl(cp);
    const glyphLabel = ctrl ? (CTRL_LABELS[cp] || '[CTL]') : seg.char;

    const card = document.createElement('div');
    card.className = 'card';

    const idx = document.createElement('div');
    idx.className = 'card-index';
    idx.textContent = '#' + String(i + 1).padStart(2, '0');

    const glyph = document.createElement('div');
    glyph.className = 'card-glyph' + (ctrl ? ' ctrl' : '');
    glyph.textContent = glyphLabel;

    const info = document.createElement('div');
    info.className = 'card-info';

    const cpSpan = document.createElement('span');
    cpSpan.className = 'card-codepoint';
    cpSpan.textContent = hex;

    const decSpan = document.createElement('span');
    decSpan.className = 'card-dec';
    decSpan.textContent = 'dec: ' + dec + '  utf8: ' + toUtf8Bytes(cp) + 'B';

    const nameSpan = document.createElement('span');
    nameSpan.className = 'card-name';
    nameSpan.title = name;
    nameSpan.textContent = name;

    info.appendChild(cpSpan);
    info.appendChild(decSpan);
    info.appendChild(nameSpan);

    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="7" height="8" rx="1"/><path d="M4 3V2a1 1 0 011-1h5a1 1 0 011 1v7a1 1 0 01-1 1H9"/></svg>コピー`;
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(seg.char).then(() => {
        btn.textContent = '✓ コピー済';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="7" height="8" rx="1"/><path d="M4 3V2a1 1 0 011-1h5a1 1 0 011 1v7a1 1 0 01-1 1H9"/></svg>コピー`;
          btn.classList.remove('copied');
        }, 1500);
      });
    });

    card.appendChild(idx);
    card.appendChild(glyph);
    card.appendChild(info);
    card.appendChild(btn);
    grid.appendChild(card);
  });

  updateMeta(str);
}

function buildEmpty() {
  const d = document.createElement('div');
  d.id = 'empty';
  d.innerHTML = '文字列を入力すると<br>ここに展開されます<small>— 1文字ずつ Unicode コードポイントを表示 —</small>';
  return d;
}

function updateMeta(str) {
  const segs = getSegments(str);
  document.getElementById('cnt-char').textContent = str.length;
  document.getElementById('cnt-cp').textContent = segs.length;
  let bytes = 0;
  for (const seg of segs) {
    bytes += toUtf8Bytes(seg.char.codePointAt(0));
  }
  document.getElementById('cnt-byte').textContent = bytes;
}

const txt = document.getElementById('txt');
txt.addEventListener('input', () => render(txt.value));
document.getElementById('btn-clear').addEventListener('click', () => {
  txt.value = '';
  render('');
  txt.focus();
});
document.getElementById('copy-all-btn').addEventListener('click', () => {
  const str = txt.value;
  if (!str) return;
  const segs = getSegments(str);
  const lines = segs.map((s, i) => {
    const cp = s.char.codePointAt(0);
    return `[#${String(i+1).padStart(2,'0')}] ${s.char}  ${cpToHex(cp)}  dec:${cp}  ${getName(cp)}`;
  });
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = document.getElementById('copy-all-btn');
    btn.textContent = '✓ コピー済';
    setTimeout(() => { btn.textContent = '全てコピー ↓'; }, 1800);
  });
});

render('');
</script>
</body>
</html>
