<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地震速報モニター</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="pulse"></span>
    <h1>地震速報モニター</h1>
  </div>
  <div class="controls">
    <label class="toggle">
      <input type="checkbox" id="autoUpdate" checked>
      <span>自動更新</span>
    </label>
    <select id="filterSelect">
      <option value="all">すべて</option>
      <option value="info">地震情報</option>
      <option value="eew">緊急地震速報</option>
    </select>
    <button id="refreshBtn" title="今すぐ更新">⟳</button>
    <span id="status" class="status">接続中…</span>
  </div>
</header>

<main class="layout">
  <section class="map-pane">
    <div id="map"></div>
    <div class="legend" id="legend"></div>
  </section>

  <aside class="side-pane">
    <div class="detail-card" id="detailCard">
      <p class="placeholder">地震を選択すると詳細が表示されます</p>
    </div>
    <h2 class="list-title">履歴 <span id="count"></span></h2>
    <ul class="quake-list" id="quakeList"></ul>
  </aside>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
