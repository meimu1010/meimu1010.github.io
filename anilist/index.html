<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AniList アニメ履歴ビューワー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.09);
    --border2: rgba(0,0,0,0.15);
    --accent: #0284c7;
    --text: #18181b;
    --muted: #71717a;
    --spring: #16a34a;
    --summer: #d97706;
    --fall:   #b45309;
    --winter: #1d4ed8;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 36px 24px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 32px;
  }

  .logo {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0;
  }

  .site-title { font-size: 19px; font-weight: 700; color: var(--text); }
  .site-title span { color: var(--accent); }

  /* Search */
  .search-section {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 24px;
  }

  .search-row { display: flex; gap: 10px; }

  .search-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 11px 14px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-row input:focus { border-color: var(--accent); }
  .search-row input::placeholder { color: var(--muted); }

  .btn-search {
    background: var(--accent);
    color: #fff; border: none;
    border-radius: var(--radius);
    padding: 11px 22px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500; font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-search:hover { opacity: 0.87; }
  .btn-search:active { transform: scale(0.97); }
  .btn-search:disabled { opacity: 0.4; cursor: not-allowed; }

  .hint { margin-top: 10px; font-size: 12px; color: var(--muted); }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px;
    margin-top: 16px;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }

  .stat-num { font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* Currently watching section */
  .watching-section { margin-bottom: 36px; }

  .section-heading {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--accent);
  }

  .section-heading-text { font-size: 15px; font-weight: 700; color: var(--text); }

  .watching-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
    animation: pulse 1.8s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
    50%      { box-shadow: 0 0 0 6px rgba(34,197,94,0.07); }
  }

  .watching-count { font-size: 13px; color: var(--muted); }

  /* Filters */
  .filters-bar {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 28px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .filter-group { display: flex; flex-direction: column; gap: 5px; }
  .filter-group label { font-size: 11px; color: var(--muted); font-weight: 500; }

  .filter-group select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    cursor: pointer;
    min-width: 160px;
  }

  .genre-count-info { font-size: 11px; color: var(--accent); margin-top: 2px; min-height: 14px; }

  .filter-result { margin-left: auto; font-size: 13px; color: var(--muted); padding-bottom: 2px; }

  /* Year block */
  .year-block { margin-bottom: 44px; }

  .year-heading {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border2);
  }

  .year-num { font-size: 26px; font-weight: 700; color: var(--text); }
  .year-count-badge { font-size: 13px; color: var(--muted); font-weight: 300; }

  /* Season block */
  .season-block { margin-bottom: 26px; }

  .season-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }

  .season-pip { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pip-spring { background: var(--spring); }
  .pip-summer { background: var(--summer); }
  .pip-fall   { background: var(--fall); }
  .pip-winter { background: var(--winter); }
  .pip-unknown { background: var(--muted); }

  .season-label { font-size: 14px; font-weight: 500; }
  .season-label.spring { color: var(--spring); }
  .season-label.summer { color: var(--summer); }
  .season-label.fall   { color: var(--fall); }
  .season-label.winter { color: var(--winter); }
  .season-label.unknown { color: var(--muted); }

  .season-line { flex: 1; height: 1px; background: var(--border2); }
  .season-count { font-size: 12px; color: var(--muted); }

  /* Anime grid */
  .anime-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }

  .anime-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
    text-decoration: none;
    display: block;
    color: inherit;
  }
  .anime-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 5px 16px rgba(0,0,0,0.09);
  }

  .anime-cover {
    width: 100%; aspect-ratio: 3/4;
    object-fit: cover;
    background: var(--surface2);
    display: block;
  }

  .anime-cover-placeholder {
    width: 100%; aspect-ratio: 3/4;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; color: var(--muted);
  }

  .anime-body { padding: 8px 10px 10px; }

  .anime-title {
    font-size: 11px; font-weight: 400; line-height: 1.45;
    color: var(--text);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    margin-bottom: 5px;
  }

  .badge-status {
    display: inline-block;
    font-size: 10px; padding: 2px 6px;
    border-radius: 4px; font-weight: 500; line-height: 1.4;
  }
  .badge-status-COMPLETED { background: #e0f2fe; color: #075985; }
  .badge-status-CURRENT   { background: #dcfce7; color: #166534; }
  .badge-status-PLANNING  { background: #ede9fe; color: #5b21b6; }
  .badge-status-DROPPED   { background: #fee2e2; color: #991b1b; }
  .badge-status-PAUSED    { background: #fef3c7; color: #92400e; }

  /* Messages */
  .msg-loading { text-align: center; padding: 60px; }
  .spinner {
    width: 34px; height: 34px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  .msg-loading p { color: var(--muted); font-size: 14px; }
  .msg-error {
    background: #fee2e2; border: 1px solid #fca5a5;
    border-radius: var(--radius);
    padding: 12px 16px; color: #991b1b; font-size: 14px; margin-bottom: 20px;
  }
  .msg-empty { text-align: center; padding: 50px; color: var(--muted); font-size: 14px; }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">AL</div>
    <div class="site-title">Ani<span>List</span> 履歴ビューワー</div>
  </header>

  <div class="search-section">
    <div class="search-row">
      <input type="text" id="userInput" placeholder="AniList ユーザー名を入力..."/>
      <button class="btn-search" id="searchBtn" onclick="loadUser()">検索</button>
    </div>
    <p class="hint">※ AniListのユーザー名を入力してください。公開リストのみ取得できます。</p>
    <div id="statsGrid" style="display:none" class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="st-total">0</div><div class="stat-lbl">合計本数</div></div>
      <div class="stat-card"><div class="stat-num" id="st-completed">0</div><div class="stat-lbl">完了</div></div>
      <div class="stat-card"><div class="stat-num" id="st-watching">0</div><div class="stat-lbl">視聴中</div></div>
      <div class="stat-card"><div class="stat-num" id="st-score">—</div><div class="stat-lbl">Average Score</div></div>
      <div class="stat-card"><div class="stat-num" id="st-years">0</div><div class="stat-lbl">年数</div></div>
    </div>
  </div>

  <div id="errorBox" style="display:none" class="msg-error"></div>

  <!-- Currently Watching -->
  <div id="watchingSection" style="display:none" class="watching-section">
    <div class="section-heading">
      <div class="watching-dot"></div>
      <span class="section-heading-text">視聴中</span>
      <span class="watching-count" id="watchingCount"></span>
    </div>
    <div class="anime-grid" id="watchingGrid"></div>
  </div>

  <!-- Filters -->
  <div id="filtersBar" style="display:none" class="filters-bar">
    <div class="filter-group">
      <label>ステータス</label>
      <select id="statusFilter" onchange="renderAll()">
        <option value="">すべて</option>
        <option value="COMPLETED">完了</option>
        <option value="CURRENT">視聴中</option>
        <option value="PLANNING">予定</option>
        <option value="DROPPED">中断</option>
        <option value="PAUSED">一時停止</option>
      </select>
    </div>
    <div class="filter-group">
      <label>ジャンル</label>
      <select id="genreFilter" onchange="renderAll()">
        <option value="">すべて</option>
      </select>
      <div class="genre-count-info" id="genreCountInfo"></div>
    </div>
    <span class="filter-result" id="filterResult"></span>
  </div>

  <div id="mainContent"></div>
</div>

<script>
// 冬→春→夏→秋 の順
const SEASON_ORDER  = ['WINTER','SPRING','SUMMER','FALL'];
const SEASON_LABELS = { WINTER:'冬', SPRING:'春', SUMMER:'夏', FALL:'秋', UNKNOWN:'不明' };
const SEASON_ICONS  = { WINTER:'❄️', SPRING:'🌸', SUMMER:'☀️', FALL:'🍂', UNKNOWN:'—' };
const SEASON_CLASS  = { WINTER:'winter', SPRING:'spring', SUMMER:'summer', FALL:'fall', UNKNOWN:'unknown' };
const SEASON_PIP    = { WINTER:'pip-winter', SPRING:'pip-spring', SUMMER:'pip-summer', FALL:'pip-fall', UNKNOWN:'pip-unknown' };
const STATUS_LABELS = { COMPLETED:'完了', CURRENT:'視聴中', PLANNING:'予定', DROPPED:'中断', PAUSED:'一時停止' };

let allEntries = [];

async function fetchAll(username) {
  const query = `
  query($username: String, $page: Int) {
    Page(page: $page, perPage: 50) {
      pageInfo { hasNextPage }
      mediaList(userName: $username, type: ANIME) {
        status score(format: POINT_10)
        media {
          id title { romaji native }
          seasonYear season
          startDate { year month day }
          coverImage { large }
          genres
          siteUrl
        }
      }
    }
  }`;

  let entries = [], page = 1;
  while (true) {
    const res = await fetch('https://graphql.anilist.co', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ query, variables: { username, page } })
    });
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      throw new Error(j.errors?.[0]?.message || res.statusText);
    }
    const json = await res.json();
    if (json.errors) throw new Error(json.errors[0].message);
    const pageData = json.data.Page;
    entries.push(...pageData.mediaList);
    if (!pageData.pageInfo.hasNextPage) break;
    page++;
  }
  return entries;
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '⚠ ' + msg;
  box.style.display = 'block';
}
function hideError() { document.getElementById('errorBox').style.display = 'none'; }
function setLoading(on) {
  const btn = document.getElementById('searchBtn');
  btn.disabled = on;
  btn.textContent = on ? '読み込み中...' : '検索';
}

async function loadUser() {
  const username = document.getElementById('userInput').value.trim();
  if (!username) return;
  hideError();
  setLoading(true);
  document.getElementById('mainContent').innerHTML =
    `<div class="msg-loading"><div class="spinner"></div><p>データ取得中...</p></div>`;
  document.getElementById('statsGrid').style.display = 'none';
  document.getElementById('filtersBar').style.display = 'none';
  document.getElementById('watchingSection').style.display = 'none';

  try {
    allEntries = await fetchAll(username);
    if (allEntries.length === 0) {
      document.getElementById('mainContent').innerHTML =
        '<div class="msg-empty">アニメリストが空または非公開です。</div>';
      setLoading(false);
      return;
    }
    updateStats();
    buildGenreFilter();
    renderWatching();
    document.getElementById('statsGrid').style.display = 'grid';
    document.getElementById('filtersBar').style.display = 'flex';
    renderAll();
  } catch(e) {
    document.getElementById('mainContent').innerHTML = '';
    showError(e.message || 'データの取得に失敗しました。');
  }
  setLoading(false);
}

function updateStats() {
  const total     = allEntries.length;
  const completed = allEntries.filter(e => e.status === 'COMPLETED').length;
  const watching  = allEntries.filter(e => e.status === 'CURRENT').length;
  const scored    = allEntries.filter(e => e.score > 0);
  const avgScore  = scored.length
    ? (scored.reduce((s, e) => s + e.score, 0) / scored.length).toFixed(1) : '—';
  const years = new Set(
    allEntries.map(e => e.media.seasonYear || e.media.startDate?.year).filter(Boolean)
  ).size;

  document.getElementById('st-total').textContent     = total;
  document.getElementById('st-completed').textContent = completed;
  document.getElementById('st-watching').textContent  = watching;
  document.getElementById('st-score').textContent     = avgScore;
  document.getElementById('st-years').textContent     = years;
}

function buildGenreFilter() {
  const genreCount = {};
  for (const e of allEntries) {
    for (const g of (e.media.genres || [])) {
      genreCount[g] = (genreCount[g] || 0) + 1;
    }
  }
  const sorted = Object.entries(genreCount).sort((a, b) => b[1] - a[1]);
  const sel = document.getElementById('genreFilter');
  sel.innerHTML = '<option value="">すべて</option>';
  for (const [g, cnt] of sorted) {
    const opt = document.createElement('option');
    opt.value = g;
    opt.textContent = `${g}（${cnt}）`;
    sel.appendChild(opt);
  }
}

function renderWatching() {
  const list = allEntries.filter(e => e.status === 'CURRENT');
  const sec  = document.getElementById('watchingSection');
  const grid = document.getElementById('watchingGrid');
  if (list.length === 0) { sec.style.display = 'none'; return; }
  document.getElementById('watchingCount').textContent = `${list.length} 本`;
  grid.innerHTML = list.map(e => renderCard(e)).join('');
  sec.style.display = 'block';
}

function getFilteredEntries() {
  const sf = document.getElementById('statusFilter').value;
  const gf = document.getElementById('genreFilter').value;

  const filtered = allEntries.filter(e => {
    if (sf && e.status !== sf) return false;
    if (gf && !(e.media.genres || []).includes(gf)) return false;
    return true;
  });

  // ジャンル件数表示
  const infoEl = document.getElementById('genreCountInfo');
  if (gf) {
    const count = allEntries.filter(e => (e.media.genres || []).includes(gf)).length;
    infoEl.textContent = `このジャンル: ${count} 本`;
  } else {
    infoEl.textContent = '';
  }

  return filtered;
}

function renderAll() {
  const entries = getFilteredEntries();
  document.getElementById('filterResult').textContent = `${entries.length} 件表示`;

  const byYear = {};
  for (const e of entries) {
    const y = e.media.seasonYear || e.media.startDate?.year || 'UNKNOWN';
    const s = e.media.season || 'UNKNOWN';
    if (!byYear[y]) byYear[y] = {};
    if (!byYear[y][s]) byYear[y][s] = [];
    byYear[y][s].push(e);
  }

  for (const y in byYear) {
    for (const s in byYear[y]) {
      byYear[y][s].sort((a, b) => {
        const am = a.media.startDate?.month || 99, ad = a.media.startDate?.day || 99;
        const bm = b.media.startDate?.month || 99, bd = b.media.startDate?.day || 99;
        return am !== bm ? am - bm : ad - bd;
      });
    }
  }

  const years = Object.keys(byYear).sort((a, b) => {
    if (a === 'UNKNOWN') return 1;
    if (b === 'UNKNOWN') return -1;
    return Number(b) - Number(a);
  });

  if (years.length === 0) {
    document.getElementById('mainContent').innerHTML =
      '<div class="msg-empty">該当するアニメがありません。</div>';
    return;
  }

  let html = '';
  for (const year of years) {
    const yearEntries = Object.values(byYear[year]).flat();
    html += `<div class="year-block">
      <div class="year-heading">
        <div class="year-num">${year}</div>
        <div class="year-count-badge">${yearEntries.length} 本</div>
      </div>`;

    const seasonsInYear = Object.keys(byYear[year]);
    // 冬→春→夏→秋 の順、最後に UNKNOWN
    const orderedSeasons = [
      ...SEASON_ORDER.filter(s => seasonsInYear.includes(s)),
      ...(seasonsInYear.includes('UNKNOWN') ? ['UNKNOWN'] : [])
    ];

    for (const season of orderedSeasons) {
      const list = byYear[year][season];
      const cls  = SEASON_CLASS[season] || 'unknown';
      const pip  = SEASON_PIP[season]   || 'pip-unknown';
      html += `<div class="season-block">
        <div class="season-header">
          <div class="season-pip ${pip}"></div>
          <span class="season-label ${cls}">${SEASON_ICONS[season]} ${SEASON_LABELS[season]}</span>
          <div class="season-line"></div>
          <span class="season-count">${list.length} 本</span>
        </div>
        <div class="anime-grid">`;
      for (const entry of list) html += renderCard(entry);
      html += `</div></div>`;
    }
    html += `</div>`;
  }

  document.getElementById('mainContent').innerHTML = html;
}

function renderCard(entry) {
  const media  = entry.media;
  const title  = media.title.native || media.title.romaji || '不明';
  const cover  = media.coverImage?.large;
  const status = entry.status;
  const url    = media.siteUrl || '#';

  const coverHtml = cover
    ? `<img class="anime-cover" src="${cover}" alt="" loading="lazy">`
    : `<div class="anime-cover-placeholder">🎬</div>`;

  return `<a class="anime-card" href="${url}" target="_blank" rel="noopener">
    ${coverHtml}
    <div class="anime-body">
      <div class="anime-title">${esc(title)}</div>
      <span class="badge-status badge-status-${status}">${STATUS_LABELS[status] || status}</span>
    </div>
  </a>`;
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadUser();
});
</script>
</body>
</html>
