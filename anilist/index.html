<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AniList アニメ履歴ビューワー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/wanakana@5.3.1/umd/wanakana.min.js"></script>
<style>
  :root {
    --bg: #faf8f3;
    --surface: #ffffff;
    --surface2: #f3f1ea;
    --border: #e5e2d8;
    --border2: #d6d2c4;
    --accent: #4a6fa5;
    --accent-dark: #34547a;
    --text: #2d2d2d;
    --muted: #7a7568;
    --spring: #4a8a3f;
    --summer: #c87533;
    --fall:   #9a5a2b;
    --winter: #3a5a8a;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.6;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; color: #fff; flex-shrink: 0;
    letter-spacing: 0.5px;
  }

  .site-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .site-title span { color: var(--accent); }

  /* Tabs */
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    padding: 10px 20px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Search */
  .search-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }

  .search-row { display: flex; gap: 8px; }

  .search-row input {
    flex: 1;
    background: #fff;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-row input:focus { border-color: var(--accent); }
  .search-row input::placeholder { color: var(--muted); }

  .btn-search {
    background: var(--accent);
    color: #fff; border: none;
    border-radius: var(--radius);
    padding: 10px 22px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500; font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-search:hover { background: var(--accent-dark); }
  .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }

  .hint { margin-top: 10px; font-size: 12px; color: var(--muted); }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 0;
    margin-top: 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .stat-card {
    background: var(--surface2);
    padding: 12px 10px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat-card:last-child { border-right: none; }

  .stat-num { font-size: 20px; font-weight: 700; color: var(--accent-dark); line-height: 1.2; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Currently watching section */
  .watching-section { margin-bottom: 36px; }

  .section-heading {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .section-heading-text { font-size: 15px; font-weight: 700; color: var(--text); }

  .watching-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #5a9b4e;
    flex-shrink: 0;
  }

  .watching-count { font-size: 12px; color: var(--muted); margin-left: 4px; }

  /* Filters */
  .filters-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 24px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 11px; color: var(--muted); font-weight: 500; }

  .filter-group select {
    background: #fff;
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    cursor: pointer;
    min-width: 160px;
  }

  .genre-count-info { font-size: 11px; color: var(--accent); margin-top: 2px; min-height: 14px; }
  .filter-result { margin-left: auto; font-size: 13px; color: var(--muted); padding-bottom: 2px; }

  /* Year block */
  .year-block { margin-bottom: 40px; }

  .year-heading {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 18px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .year-num { font-size: 24px; font-weight: 700; color: var(--text); }
  .year-count-badge { font-size: 12px; color: var(--muted); font-weight: 400; }

  /* Season block */
  .season-block { margin-bottom: 22px; }

  .season-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }

  .season-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .pip-spring { background: var(--spring); }
  .pip-summer { background: var(--summer); }
  .pip-fall   { background: var(--fall); }
  .pip-winter { background: var(--winter); }
  .pip-unknown { background: var(--muted); }

  .season-label { font-size: 13px; font-weight: 500; }
  .season-label.spring { color: var(--spring); }
  .season-label.summer { color: var(--summer); }
  .season-label.fall   { color: var(--fall); }
  .season-label.winter { color: var(--winter); }
  .season-label.unknown { color: var(--muted); }

  .season-line { flex: 1; height: 1px; background: var(--border); }
  .season-count { font-size: 12px; color: var(--muted); }

  /* Anime grid */
  .anime-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }

  .anime-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s;
    text-decoration: none;
    display: block;
    color: inherit;
  }
  .anime-card:hover { border-color: var(--accent); }
  .anime-result-card { cursor: pointer; }

  .anime-cover {
    width: 100%; aspect-ratio: 3/4;
    object-fit: cover;
    background: var(--surface2);
    display: block;
  }

  .anime-cover-placeholder {
    width: 100%; aspect-ratio: 3/4;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; color: var(--muted);
  }

  .anime-body { padding: 8px 9px 9px; }

  .anime-title {
    font-size: 11px; font-weight: 400; line-height: 1.45;
    color: var(--text);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    margin-bottom: 5px;
  }

  .anime-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .anime-year { font-size: 10px; color: var(--muted); font-weight: 500; }

  .badge-status {
    display: inline-block;
    font-size: 10px; padding: 1px 6px;
    border-radius: 3px; font-weight: 500; line-height: 1.5;
    border: 1px solid transparent;
  }
  .badge-status-COMPLETED { background: #eaf2f8; color: #2c5282; border-color: #cbdcec; }
  .badge-status-CURRENT   { background: #ecf4e8; color: #3e6b34; border-color: #cfe2c4; }
  .badge-status-PLANNING  { background: #efeae0; color: #6b5a2b; border-color: #ddd4bf; }
  .badge-status-DROPPED   { background: #f4e6e3; color: #8a3a2f; border-color: #e0c8c2; }
  .badge-status-PAUSED    { background: #f3ecdb; color: #7a5a1c; border-color: #ddd0aa; }

  /* ===== VOICE ACTOR TAB ===== */
  .va-search-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }

  .va-hint { margin-top: 8px; font-size: 12px; color: var(--muted); }

  /* VA / Anime result header */
  .va-result-header {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
  }

  .va-avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .va-avatar-placeholder {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }

  .anime-select-cover {
    width: 60px; height: 84px;
    object-fit: cover;
    border-radius: 4px;
    background: var(--surface2);
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .va-info { flex: 1; min-width: 0; }
  .va-name { font-size: 17px; font-weight: 700; color: var(--text); }
  .va-name-native { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .va-stats-row { display: flex; gap: 16px; margin-top: 8px; }
  .va-stat { font-size: 12px; color: var(--muted); }
  .va-stat strong { color: var(--accent-dark); font-weight: 700; }

  /* Character result grid */
  .char-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  .char-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    gap: 0;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s;
  }
  .char-card:hover { border-color: var(--accent); }

  .char-cover {
    width: 60px; flex-shrink: 0;
    object-fit: cover;
    background: var(--surface2);
    display: block;
    align-self: stretch;
  }

  .char-cover-placeholder {
    width: 60px; flex-shrink: 0;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: var(--muted);
  }

  .char-body {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
    gap: 3px;
  }

  .char-name {
    font-size: 13px; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .char-role {
    font-size: 11px; color: var(--muted);
  }

  .char-anime {
    font-size: 11px; color: var(--accent);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }

  .char-anime-year {
    font-size: 10px; color: var(--muted);
    margin-top: 1px;
  }

  /* new: native / hiragana name rows for anime-search character cards */
  .char-native {
    font-size: 12px; color: var(--text);
    margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .char-hiragana {
    font-size: 11px; color: var(--accent-dark);
    margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .char-field-label {
    font-size: 9px; color: var(--muted); font-weight: 500;
    margin-right: 4px;
  }

  /* Candidate list */
  .va-candidates {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
  }

  .va-candidate-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
  }
  .va-candidate-item:last-child { border-bottom: none; }
  .va-candidate-item:hover { background: var(--surface2); }

  .va-cand-avatar {
    width: 40px; height: 40px;
    border-radius: 50%; object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .va-cand-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .va-cand-native { font-size: 12px; color: var(--muted); }

  .va-section-title {
    font-size: 12px; color: var(--muted);
    margin-bottom: 8px;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--accent);
    cursor: pointer;
  }
  .back-link:hover { text-decoration: underline; }

  /* Messages */
  .msg-loading { text-align: center; padding: 50px; }
  .spinner {
    width: 30px; height: 30px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  .msg-loading p { color: var(--muted); font-size: 14px; }
  .msg-error {
    background: #f4e6e3; border: 1px solid #e0c8c2;
    border-radius: var(--radius);
    padding: 11px 14px; color: #8a3a2f; font-size: 13px; margin-bottom: 18px;
  }
  .msg-empty { text-align: center; padding: 50px; color: var(--muted); font-size: 14px; }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">AL</div>
    <div class="site-title">Ani<span>List</span> 履歴ビューワー</div>
  </header>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('list')">📋 アニメリスト</button>
    <button class="tab-btn" onclick="switchTab('va')" id="vaTabBtn">🎙️ 声優検索</button>
    <button class="tab-btn" onclick="switchTab('search')" id="animeSearchTabBtn">🔍 アニメ検索</button>
  </div>

  <!-- ===== TAB: ANIME LIST ===== -->
  <div class="tab-panel active" id="tab-list">
    <div class="search-section">
      <div class="search-row">
        <input type="text" id="userInput" placeholder="AniList ユーザー名を入力..."/>
        <button class="btn-search" id="searchBtn" onclick="loadUser()">検索</button>
      </div>
      <p class="hint">※ AniListのユーザー名を入力してください。公開リストのみ取得できます。</p>
      <div id="statsGrid" style="display:none" class="stats-grid">
        <div class="stat-card"><div class="stat-num" id="st-total">0</div><div class="stat-lbl">合計本数</div></div>
        <div class="stat-card"><div class="stat-num" id="st-completed">0</div><div class="stat-lbl">完了</div></div>
        <div class="stat-card"><div class="stat-num" id="st-watching">0</div><div class="stat-lbl">視聴中</div></div>
        <div class="stat-card"><div class="stat-num" id="st-score">—</div><div class="stat-lbl">Average Score</div></div>
        <div class="stat-card"><div class="stat-num" id="st-years">0</div><div class="stat-lbl">年数</div></div>
      </div>
    </div>

    <div id="errorBox" style="display:none" class="msg-error"></div>

    <div id="watchingSection" style="display:none" class="watching-section">
      <div class="section-heading">
        <div class="watching-dot"></div>
        <span class="section-heading-text">視聴中</span>
        <span class="watching-count" id="watchingCount"></span>
      </div>
      <div class="anime-grid" id="watchingGrid"></div>
    </div>

    <div id="filtersBar" style="display:none" class="filters-bar">
      <div class="filter-group">
        <label>ステータス</label>
        <select id="statusFilter" onchange="renderAll()">
          <option value="">すべて</option>
          <option value="COMPLETED">完了</option>
          <option value="CURRENT">視聴中</option>
          <option value="PLANNING">予定</option>
          <option value="DROPPED">中断</option>
          <option value="PAUSED">一時停止</option>
        </select>
      </div>
      <div class="filter-group">
        <label>ジャンル</label>
        <select id="genreFilter" onchange="renderAll()">
          <option value="">すべて</option>
        </select>
        <div class="genre-count-info" id="genreCountInfo"></div>
      </div>
      <span class="filter-result" id="filterResult"></span>
    </div>

    <div id="mainContent"></div>
  </div>

  <!-- ===== TAB: VOICE ACTOR ===== -->
  <div class="tab-panel" id="tab-va">
    <div class="va-search-section">
      <div class="search-row">
        <input type="text" id="vaInput" placeholder="声優名を入力（日本語・ローマ字可）..."/>
        <button class="btn-search" id="vaSearchBtn" onclick="searchVA()">検索</button>
      </div>
      <p class="va-hint">※ アニメリストを先に読み込んでください。視聴済みアニメに出演しているキャラのみ表示します。</p>
    </div>

    <div id="vaErrorBox" style="display:none" class="msg-error"></div>
    <div id="vaContent"></div>
  </div>

  <!-- ===== TAB: ANIME SEARCH ===== -->
  <div class="tab-panel" id="tab-search">
    <div class="search-section">
      <div class="search-row">
        <input type="text" id="animeSearchInput" placeholder="アニメタイトルを入力..."/>
        <button class="btn-search" id="animeSearchBtn" onclick="searchAnime()">検索</button>
      </div>
      <p class="hint">※ タイトルの一部でも検索できます。アニメを選択すると、そのキャラクター一覧を「名前（日本語表記）／ローマ字／ひらがな」で表示します。</p>
    </div>

    <div id="animeSearchErrorBox" style="display:none" class="msg-error"></div>
    <div id="animeSearchContent"></div>
  </div>

</div>

<script>
// ========== CONSTANTS ==========
const SEASON_ORDER  = ['FALL','SUMMER','SPRING','WINTER'];
const SEASON_LABELS = { WINTER:'冬', SPRING:'春', SUMMER:'夏', FALL:'秋', UNKNOWN:'不明' };
const SEASON_ICONS  = { WINTER:'❄️', SPRING:'🌸', SUMMER:'☀️', FALL:'🍂', UNKNOWN:'—' };
const SEASON_CLASS  = { WINTER:'winter', SPRING:'spring', SUMMER:'summer', FALL:'fall', UNKNOWN:'unknown' };
const SEASON_PIP    = { WINTER:'pip-winter', SPRING:'pip-spring', SUMMER:'pip-summer', FALL:'pip-fall', UNKNOWN:'pip-unknown' };
const STATUS_LABELS = { COMPLETED:'完了', CURRENT:'視聴中', PLANNING:'予定', DROPPED:'中断', PAUSED:'一時停止' };
const ROLE_LABELS   = { MAIN:'メイン', SUPPORTING:'サブ', BACKGROUND:'モブ' };

let allEntries = [];   // anime list entries
let mediaIdSet = new Set(); // set of media IDs from user's list (excluding PLANNING)

// ========== TABS ==========
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ========== ANILIST API ==========
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function gqlRequest(query, variables, retries = 5) {
  for (let attempt = 0; attempt <= retries; attempt++) {
    const res = await fetch('https://graphql.anilist.co', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ query, variables })
    });

    if (res.status === 429) {
      // Respect Retry-After header if present, otherwise back off exponentially
      const retryAfter = parseInt(res.headers.get('Retry-After') || '0', 10);
      const wait = retryAfter > 0 ? retryAfter * 1000 : Math.min(2000 * Math.pow(2, attempt), 30000);
      if (attempt < retries) {
        await sleep(wait);
        continue;
      } else {
        throw new Error('レート制限に達しました。しばらく待ってから再試行してください。');
      }
    }

    const json = await res.json();
    if (json.errors) throw new Error(json.errors[0].message);
    return json.data;
  }
}

// ========== ANIME LIST ==========
function setLoadingMsg(msg) {
  const el = document.querySelector('#mainContent .msg-loading p');
  if (el) el.textContent = msg;
}

async function fetchAll(username) {
  const query = `
  query($username: String, $page: Int) {
    Page(page: $page, perPage: 50) {
      pageInfo { hasNextPage }
      mediaList(userName: $username, type: ANIME) {
        status score(format: POINT_10)
        media {
          id title { romaji native }
          seasonYear season
          startDate { year month day }
          coverImage { large }
          genres siteUrl
        }
      }
    }
  }`;
  let entries = [], page = 1;
  while (true) {
    setLoadingMsg(`データ取得中... (${entries.length} 件取得済み)`);
    const data = await gqlRequest(query, { username, page });
    entries.push(...data.Page.mediaList);
    if (!data.Page.pageInfo.hasNextPage) break;
    page++;
    await sleep(600);
  }
  return entries;
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '⚠ ' + msg;
  box.style.display = 'block';
}
function hideError() { document.getElementById('errorBox').style.display = 'none'; }
function setLoading(on) {
  const btn = document.getElementById('searchBtn');
  btn.disabled = on;
  btn.textContent = on ? '読み込み中...' : '検索';
}

async function loadUser() {
  const username = document.getElementById('userInput').value.trim();
  if (!username) return;
  hideError();
  setLoading(true);
  document.getElementById('mainContent').innerHTML =
    `<div class="msg-loading"><div class="spinner"></div><p>データ取得中...</p></div>`;
  document.getElementById('statsGrid').style.display = 'none';
  document.getElementById('filtersBar').style.display = 'none';
  document.getElementById('watchingSection').style.display = 'none';

  try {
    allEntries = await fetchAll(username);
    // build mediaIdSet: all statuses except PLANNING (user has seen/is seeing these)
    mediaIdSet = new Set(
      allEntries
        .filter(e => e.status !== 'PLANNING')
        .map(e => e.media.id)
    );
    if (allEntries.length === 0) {
      document.getElementById('mainContent').innerHTML =
        '<div class="msg-empty">アニメリストが空または非公開です。</div>';
      setLoading(false);
      return;
    }
    updateStats();
    buildGenreFilter();
    renderWatching();
    document.getElementById('statsGrid').style.display = 'grid';
    document.getElementById('filtersBar').style.display = 'flex';
    renderAll();
  } catch(e) {
    document.getElementById('mainContent').innerHTML = '';
    showError(e.message || 'データの取得に失敗しました。');
  }
  setLoading(false);
}

function updateStats() {
  const total     = allEntries.length;
  const completed = allEntries.filter(e => e.status === 'COMPLETED').length;
  const watching  = allEntries.filter(e => e.status === 'CURRENT').length;
  const scored    = allEntries.filter(e => e.score > 0);
  const avgScore  = scored.length
    ? (scored.reduce((s, e) => s + e.score, 0) / scored.length).toFixed(1) : '—';
  const years = new Set(
    allEntries.map(e => e.media.seasonYear || e.media.startDate?.year).filter(Boolean)
  ).size;
  document.getElementById('st-total').textContent     = total;
  document.getElementById('st-completed').textContent = completed;
  document.getElementById('st-watching').textContent  = watching;
  document.getElementById('st-score').textContent     = avgScore;
  document.getElementById('st-years').textContent     = years;
}

function buildGenreFilter() {
  const genreCount = {};
  for (const e of allEntries)
    for (const g of (e.media.genres || []))
      genreCount[g] = (genreCount[g] || 0) + 1;
  const sorted = Object.entries(genreCount).sort((a, b) => b[1] - a[1]);
  const sel = document.getElementById('genreFilter');
  sel.innerHTML = '<option value="">すべて</option>';
  for (const [g, cnt] of sorted) {
    const opt = document.createElement('option');
    opt.value = g;
    opt.textContent = `${g}（${cnt}）`;
    sel.appendChild(opt);
  }
}

function renderWatching() {
  const list = allEntries.filter(e => e.status === 'CURRENT');
  const sec  = document.getElementById('watchingSection');
  if (list.length === 0) { sec.style.display = 'none'; return; }
  document.getElementById('watchingCount').textContent = `${list.length} 本`;
  document.getElementById('watchingGrid').innerHTML = list.map(e => renderCard(e, true)).join('');
  sec.style.display = 'block';
}

function getFilteredEntries() {
  const sf = document.getElementById('statusFilter').value;
  const gf = document.getElementById('genreFilter').value;
  const filtered = allEntries.filter(e => {
    if (sf && e.status !== sf) return false;
    if (gf && !(e.media.genres || []).includes(gf)) return false;
    return true;
  });
  const infoEl = document.getElementById('genreCountInfo');
  if (gf) {
    const count = allEntries.filter(e => (e.media.genres || []).includes(gf)).length;
    infoEl.textContent = `このジャンル: ${count} 本`;
  } else {
    infoEl.textContent = '';
  }
  return filtered;
}

function renderAll() {
  const entries = getFilteredEntries();
  document.getElementById('filterResult').textContent = `${entries.length} 件表示`;

  const byYear = {};
  for (const e of entries) {
    const y = e.media.seasonYear || e.media.startDate?.year || 'UNKNOWN';
    const s = e.media.season || 'UNKNOWN';
    if (!byYear[y]) byYear[y] = {};
    if (!byYear[y][s]) byYear[y][s] = [];
    byYear[y][s].push(e);
  }
  for (const y in byYear)
    for (const s in byYear[y])
      byYear[y][s].sort((a, b) => {
        const am = a.media.startDate?.month || 99, ad = a.media.startDate?.day || 99;
        const bm = b.media.startDate?.month || 99, bd = b.media.startDate?.day || 99;
        return am !== bm ? am - bm : ad - bd;
      });

  const years = Object.keys(byYear).sort((a, b) => {
    if (a === 'UNKNOWN') return 1;
    if (b === 'UNKNOWN') return -1;
    return Number(b) - Number(a);
  });

  if (years.length === 0) {
    document.getElementById('mainContent').innerHTML =
      '<div class="msg-empty">該当するアニメがありません。</div>';
    return;
  }

  let html = '';
  for (const year of years) {
    const yearEntries = Object.values(byYear[year]).flat();
    html += `<div class="year-block">
      <div class="year-heading">
        <div class="year-num">${year}</div>
        <div class="year-count-badge">${yearEntries.length} 本</div>
      </div>`;
    const seasonsInYear = Object.keys(byYear[year]);
    const orderedSeasons = [
      ...SEASON_ORDER.filter(s => seasonsInYear.includes(s)),
      ...(seasonsInYear.includes('UNKNOWN') ? ['UNKNOWN'] : [])
    ];
    for (const season of orderedSeasons) {
      const list = byYear[year][season];
      const cls  = SEASON_CLASS[season] || 'unknown';
      const pip  = SEASON_PIP[season]   || 'pip-unknown';
      html += `<div class="season-block">
        <div class="season-header">
          <div class="season-pip ${pip}"></div>
          <span class="season-label ${cls}">${SEASON_ICONS[season]} ${SEASON_LABELS[season]}</span>
          <div class="season-line"></div>
          <span class="season-count">${list.length} 本</span>
        </div>
        <div class="anime-grid">`;
      for (const entry of list) html += renderCard(entry, false);
      html += `</div></div>`;
    }
    html += `</div>`;
  }
  document.getElementById('mainContent').innerHTML = html;
}

function renderCard(entry, showYear) {
  const media  = entry.media;
  const title  = media.title.native || media.title.romaji || '不明';
  const cover  = media.coverImage?.large;
  const status = entry.status;
  const url    = media.siteUrl || '#';
  const year   = media.seasonYear || media.startDate?.year || null;
  const coverHtml = cover
    ? `<img class="anime-cover" src="${cover}" alt="" loading="lazy">`
    : `<div class="anime-cover-placeholder">🎬</div>`;
  const yearHtml = (showYear && year) ? `<span class="anime-year">${year}</span>` : '';
  return `<a class="anime-card" href="${url}" target="_blank" rel="noopener">
    ${coverHtml}
    <div class="anime-body">
      <div class="anime-title">${esc(title)}</div>
      <div class="anime-meta">
        <span class="badge-status badge-status-${status}">${STATUS_LABELS[status] || status}</span>
        ${yearHtml}
      </div>
    </div>
  </a>`;
}

// ========== VOICE ACTOR ==========
function showVAError(msg) {
  const box = document.getElementById('vaErrorBox');
  box.textContent = '⚠ ' + msg;
  box.style.display = 'block';
}
function hideVAError() { document.getElementById('vaErrorBox').style.display = 'none'; }
function setVALoading(on) {
  const btn = document.getElementById('vaSearchBtn');
  btn.disabled = on;
  btn.textContent = on ? '検索中...' : '検索';
}

async function searchVA() {
  const name = document.getElementById('vaInput').value.trim();
  if (!name) return;
  if (mediaIdSet.size === 0) {
    showVAError('先にアニメリストタブでユーザー名を検索してください。');
    return;
  }
  hideVAError();
  setVALoading(true);
  document.getElementById('vaContent').innerHTML =
    `<div class="msg-loading"><div class="spinner"></div><p>声優を検索中...</p></div>`;

  try {
    // Step 1: search for staff by name
    const searchData = await gqlRequest(`
      query($search: String) {
        Page(perPage: 8) {
          staff(search: $search, isBirthday: false) {
            id
            name { full native }
            image { medium }
          }
        }
      }
    `, { search: name });

    const candidates = searchData.Page.staff;
    if (candidates.length === 0) {
      document.getElementById('vaContent').innerHTML =
        '<div class="msg-empty">声優が見つかりませんでした。</div>';
      setVALoading(false);
      return;
    }

    if (candidates.length === 1) {
      await loadVAResult(candidates[0]);
    } else {
      // Show candidate picker
      showVACandidates(candidates);
    }
  } catch(e) {
    document.getElementById('vaContent').innerHTML = '';
    showVAError(e.message || '検索に失敗しました。');
  }
  setVALoading(false);
}

function showVACandidates(candidates) {
  const items = candidates.map(s => {
    const img = s.image?.medium
      ? `<img class="va-cand-avatar" src="${s.image.medium}" alt="">`
      : `<div class="va-cand-avatar" style="background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px">👤</div>`;
    const native = s.name.native ? `<div class="va-cand-native">${esc(s.name.native)}</div>` : '';
    return `<div class="va-candidate-item" onclick="selectCandidate(${s.id})">
      ${img}
      <div>
        <div class="va-cand-name">${esc(s.name.full || '')}</div>
        ${native}
      </div>
    </div>`;
  }).join('');

  document.getElementById('vaContent').innerHTML = `
    <p class="va-section-title">複数の候補が見つかりました。選択してください：</p>
    <div class="va-candidates">${items}</div>
  `;
}

async function selectCandidate(id) {
  setVALoading(true);
  hideVAError();
  document.getElementById('vaContent').innerHTML =
    `<div class="msg-loading"><div class="spinner"></div><p>データ取得中...</p></div>`;
  try {
    // fetch minimal info to create the staff object
    const data = await gqlRequest(`
      query($id: Int) {
        Staff(id: $id) {
          id name { full native } image { medium }
        }
      }
    `, { id });
    await loadVAResult(data.Staff);
  } catch(e) {
    showVAError(e.message);
  }
  setVALoading(false);
}

async function loadVAResult(staff) {
  // Fetch all character roles for this VA, paginated
  const query = `
    query($id: Int, $page: Int) {
      Staff(id: $id) {
        name { full native }
        image { medium }
        characterMedia(page: $page, perPage: 25, sort: START_DATE_DESC) {
          pageInfo { hasNextPage }
          edges {
            characterRole
            characters { id name { full } image { medium } }
            node {
              id
              title { native romaji }
              coverImage { large }
              seasonYear
              siteUrl
            }
          }
        }
      }
    }
  `;

  let allEdges = [], page = 1, staffInfo = null;

  document.getElementById('vaContent').innerHTML =
    `<div class="msg-loading"><div class="spinner"></div><p>出演情報を取得中...</p></div>`;

  while (true) {
    const vaLoadEl = document.querySelector('#vaContent .msg-loading p');
    if (vaLoadEl) vaLoadEl.textContent = `出演情報を取得中... (${allEdges.length} 件取得済み)`;
    const data = await gqlRequest(query, { id: staff.id, page });
    const s = data.Staff;
    if (!staffInfo) staffInfo = s;
    allEdges.push(...s.characterMedia.edges);
    if (!s.characterMedia.pageInfo.hasNextPage) break;
    page++;
    await sleep(600);
  }

  // Filter: only anime the user has in their list (excluding PLANNING)
  const matched = [];
  for (const edge of allEdges) {
    const mediaId = edge.node.id;
    if (!mediaIdSet.has(mediaId)) continue;
    for (const ch of (edge.characters || [])) {
      matched.push({
        character: ch,
        role: edge.characterRole,
        media: edge.node
      });
    }
  }

  // Build HTML
  const name   = staffInfo.name.full || staff.name?.full || '';
  const native = staffInfo.name.native || staff.name?.native || '';
  const avatar = (staffInfo.image?.medium || staff.image?.medium);

  const avatarHtml = avatar
    ? `<img class="va-avatar" src="${avatar}" alt="">`
    : `<div class="va-avatar-placeholder">👤</div>`;

  // count unique anime
  const uniqueAnime = new Set(matched.map(m => m.media.id)).size;

  let html = `
    <div class="va-result-header">
      ${avatarHtml}
      <div class="va-info">
        <div class="va-name">${esc(name)}</div>
        ${native ? `<div class="va-name-native">${esc(native)}</div>` : ''}
        <div class="va-stats-row">
          <div class="va-stat">あなたのリスト内出演: <strong>${matched.length} キャラ</strong></div>
          <div class="va-stat">作品数: <strong>${uniqueAnime}</strong></div>
        </div>
      </div>
    </div>
  `;

  if (matched.length === 0) {
    html += `<div class="msg-empty">あなたの視聴リストに該当する出演キャラが見つかりませんでした。</div>`;
  } else {
    // Sort: MAIN first, then SUPPORTING, then by year desc
    const roleOrder = { MAIN: 0, SUPPORTING: 1, BACKGROUND: 2 };
    matched.sort((a, b) => {
      const ro = (roleOrder[a.role] ?? 9) - (roleOrder[b.role] ?? 9);
      if (ro !== 0) return ro;
      return (b.media.seasonYear || 0) - (a.media.seasonYear || 0);
    });

    html += `<div class="char-grid">`;
    for (const m of matched) {
      const chName  = m.character.name?.full || '不明';
      const chImg   = m.character.image?.medium;
      const anime   = m.media.title?.native || m.media.title?.romaji || '不明';
      const year    = m.media.seasonYear || '';
      const url     = m.media.siteUrl || '#';
      const roleLabel = ROLE_LABELS[m.role] || m.role;

      const chImgHtml = chImg
        ? `<img class="char-cover" src="${chImg}" alt="">`
        : `<div class="char-cover-placeholder">👤</div>`;

      html += `<a class="char-card" href="${url}" target="_blank" rel="noopener">
        ${chImgHtml}
        <div class="char-body">
          <div class="char-name">${esc(chName)}</div>
          <div class="char-role">${roleLabel}</div>
          <div class="char-anime">${esc(anime)}</div>
          ${year ? `<div class="char-anime-year">${year}年</div>` : ''}
        </div>
      </a>`;
    }
    html += `</div>`;
  }

  document.getElementById('vaContent').innerHTML = html;
}

// ========== ANIME SEARCH (new) ==========
let _lastAnimeSearchResults = [];

function showAnimeSearchError(msg) {
  const box = document.getElementById('animeSearchErrorBox');
  box.textContent = '⚠ ' + msg;
  box.style.display = 'block';
}
function hideAnimeSearchError() { document.getElementById('animeSearchErrorBox').style.display = 'none'; }
function setAnimeSearchLoading(on) {
  const btn = document.getElementById('animeSearchBtn');
  btn.disabled = on;
  btn.textContent = on ? '検索中...' : '検索';
}

// Convert a romaji string to hiragana using wanakana.
// Names that are not standard Japanese romaji (e.g. Western-style names) will
// not convert meaningfully — this is a mechanical conversion, not a dictionary lookup.
function toHiraganaSafe(str) {
  if (!str) return '';
  try {
    if (typeof wanakana === 'undefined') return '';
    return wanakana.toHiragana(str.toLowerCase());
  } catch (e) {
    return '';
  }
}

async function searchAnime() {
  const q = document.getElementById('animeSearchInput').value.trim();
  if (!q) return;
  hideAnimeSearchError();
  setAnimeSearchLoading(true);
  document.getElementById('animeSearchContent').innerHTML =
    `<div class="msg-loading"><div class="spinner"></div><p>アニメを検索中...</p></div>`;

  try {
    const data = await gqlRequest(`
      query($search: String) {
        Page(perPage: 12) {
          media(search: $search, type: ANIME, sort: SEARCH_MATCH) {
            id
            title { romaji native }
            coverImage { large }
            seasonYear
            format
          }
        }
      }
    `, { search: q });
    _lastAnimeSearchResults = data.Page.media;
    renderAnimeSearchResults();
  } catch(e) {
    document.getElementById('animeSearchContent').innerHTML = '';
    showAnimeSearchError(e.message || '検索に失敗しました。');
  }
  setAnimeSearchLoading(false);
}

function renderAnimeSearchResults() {
  hideAnimeSearchError();
  const list = _lastAnimeSearchResults;
  if (list.length === 0) {
    document.getElementById('animeSearchContent').innerHTML =
      '<div class="msg-empty">該当するアニメが見つかりませんでした。</div>';
    return;
  }
  let html = '<div class="anime-grid">';
  for (const m of list) {
    const title = m.title.native || m.title.romaji || '不明';
    const cover = m.coverImage?.large;
    const coverHtml = cover
      ? `<img class="anime-cover" src="${cover}" alt="" loading="lazy">`
      : `<div class="anime-cover-placeholder">🎬</div>`;
    html += `<div class="anime-card anime-result-card" onclick="loadAnimeCharacters(${m.id})">
      ${coverHtml}
      <div class="anime-body">
        <div class="anime-title">${esc(title)}</div>
        <div class="anime-meta">
          ${m.seasonYear ? `<span class="anime-year">${m.seasonYear}</span>` : ''}
        </div>
      </div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('animeSearchContent').innerHTML = html;
}

async function loadAnimeCharacters(mediaId) {
  hideAnimeSearchError();
  document.getElementById('animeSearchContent').innerHTML =
    `<div class="msg-loading"><div class="spinner"></div><p>キャラクター情報を取得中...</p></div>`;

  const query = `
    query($id: Int, $page: Int) {
      Media(id: $id) {
        id
        title { romaji native }
        coverImage { large }
        characters(page: $page, perPage: 25, sort: [ROLE, RELEVANCE]) {
          pageInfo { hasNextPage }
          edges {
            role
            node { id name { full native } image { large } }
          }
        }
      }
    }
  `;

  let edges = [], page = 1, mediaInfo = null;
  try {
    while (true) {
      const loadEl = document.querySelector('#animeSearchContent .msg-loading p');
      if (loadEl) loadEl.textContent = `キャラクター情報を取得中... (${edges.length} 件取得済み)`;
      const data = await gqlRequest(query, { id: mediaId, page });
      const m = data.Media;
      if (!mediaInfo) mediaInfo = m;
      edges.push(...m.characters.edges);
      if (!m.characters.pageInfo.hasNextPage) break;
      page++;
      await sleep(600);
    }
  } catch(e) {
    document.getElementById('animeSearchContent').innerHTML = '';
    showAnimeSearchError(e.message || 'キャラクター取得に失敗しました。');
    return;
  }

  const cover = mediaInfo.coverImage?.large;
  const coverHtml = cover
    ? `<img class="anime-select-cover" src="${cover}" alt="">`
    : `<div class="anime-select-cover"></div>`;

  let html = `<div class="back-link" onclick="renderAnimeSearchResults()">← 検索結果に戻る</div>`;
  html += `<div class="va-result-header">
    ${coverHtml}
    <div class="va-info">
      <div class="va-name">${esc(mediaInfo.title.romaji || '')}</div>
      ${mediaInfo.title.native ? `<div class="va-name-native">${esc(mediaInfo.title.native)}</div>` : ''}
      <div class="va-stats-row"><div class="va-stat">キャラクター数: <strong>${edges.length}</strong></div></div>
    </div>
  </div>`;

  if (edges.length === 0) {
    html += '<div class="msg-empty">キャラクター情報が見つかりませんでした。</div>';
  } else {
    html += '<div class="char-grid">';
    for (const edge of edges) {
      const ch = edge.node;
      const img = ch.image?.large;
      const native = ch.name?.native || '';
      const romaji = ch.name?.full || '不明';
      const hiragana = toHiraganaSafe(romaji);
      const roleLabel = ROLE_LABELS[edge.role] || edge.role;
      const imgHtml = img
        ? `<img class="char-cover" src="${img}" alt="">`
        : `<div class="char-cover-placeholder">👤</div>`;

      html += `<div class="char-card">
        ${imgHtml}
        <div class="char-body">
          <div class="char-name">${esc(native || romaji)}</div>
          <div class="char-role">${roleLabel}</div>
          <div class="char-native"><span class="char-field-label">ローマ字</span>${esc(romaji)}</div>
          ${hiragana ? `<div class="char-hiragana"><span class="char-field-label">ひらがな</span>${esc(hiragana)}</div>` : ''}
        </div>
      </div>`;
    }
    html += '</div>';
  }

  document.getElementById('animeSearchContent').innerHTML = html;
}

// ========== UTILITIES ==========
function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter key support
document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadUser();
});
document.getElementById('vaInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchVA();
});
document.getElementById('animeSearchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchAnime();
});
</script>
