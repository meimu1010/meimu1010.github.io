<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Image Viewer</title>

<style>
*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f5f5f7;
    font-family:"Segoe UI","Yu Gothic UI",sans-serif;
}

#app{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
}

header{
    display:flex;
    gap:10px;
    align-items:center;
    padding:14px 18px;

    background:#fff;
    border-bottom:1px solid #e5e5e5;
    box-shadow:0 2px 10px rgba(0,0,0,.05);

    z-index:10;
}

#imageUrl{
    flex:1;
    height:42px;

    border:1px solid #d7d7d7;
    border-radius:12px;

    padding:0 14px;
    font-size:14px;
}

button{
    height:42px;

    border:none;
    border-radius:12px;

    background:#0078d4;
    color:#fff;

    padding:0 16px;
    cursor:pointer;
}

button:hover{
    filter:brightness(1.05);
}

#status{
    min-width:90px;
    text-align:center;
    font-weight:600;
    color:#555;
}

#viewer{
    position:relative;
    flex:1;

    overflow:hidden;

    background:
        radial-gradient(
            circle at center,
            #ffffff,
            #ededed
        );

    cursor:grab;
}

#viewer.dragging{
    cursor:grabbing;
}

#dropText{
    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    color:#888;
    text-align:center;
    pointer-events:none;
}

#image{
    position:absolute;

    left:50%;
    top:50%;

    max-width:none;
    max-height:none;

    display:none;

    user-select:none;
    -webkit-user-drag:none;
}

#floatingTools{
    position:absolute;

    right:20px;
    bottom:20px;

    display:flex;
    gap:10px;

    background:#fff;

    padding:10px;

    border-radius:16px;

    box-shadow:
        0 10px 30px rgba(0,0,0,.12);
}

.toolBtn{
    width:42px;
    height:42px;

    border:none;
    border-radius:10px;

    background:#f2f2f2;
    color:#222;

    font-size:20px;
    cursor:pointer;
}

.toolBtn:hover{
    background:#e5e5e5;
}
</style>
</head>
<body>

<div id="app">

<header>

<input
    id="imageUrl"
    type="text"
    placeholder="画像URLを入力"
/>

<button id="loadBtn">
読み込み
</button>

<input
    id="fileInput"
    type="file"
    accept="image/*"
/>

<div id="status">
100%
</div>

</header>

<div id="viewer">

<div id="dropText">
画像をドラッグ＆ドロップ<br>
または Ctrl+V
</div>

<img
    id="image"
    draggable="false"
>

<div id="floatingTools">

<button
    class="toolBtn"
    id="zoomIn"
>
+
</button>

<button
    class="toolBtn"
    id="zoomOut"
>
−
</button>

<button
    class="toolBtn"
    id="resetBtn"
>
⌂
</button>

</div>

</div>

</div>

<script>
const viewer = document.getElementById("viewer");
const image = document.getElementById("image");
const statusText = document.getElementById("status");
const dropText = document.getElementById("dropText");

let scale = 1;
let fitScale = 1;

let posX = 0;
let posY = 0;

let dragging = false;

let dragStartX = 0;
let dragStartY = 0;

function updateTransform(){

    image.style.transform =
        `translate(-50%, -50%) translate(${posX}px, ${posY}px) scale(${scale})`;

    statusText.textContent =
        Math.round(scale * 100) + "%";
}

function resetView(){

    scale = fitScale;

    posX = 0;
    posY = 0;

    updateTransform();
}

function calculateFitScale(){

    const vw = viewer.clientWidth;
    const vh = viewer.clientHeight;

    const iw = image.naturalWidth;
    const ih = image.naturalHeight;

    fitScale = Math.min(
        vw / iw,
        vh / ih,
        1
    );

    scale = fitScale;

    posX = 0;
    posY = 0;

    updateTransform();
}

function showImage(src){

    image.onload = () => {

        image.style.display = "block";

        dropText.style.display = "none";

        calculateFitScale();
    };

    image.src = src;
}

document
.getElementById("loadBtn")
.addEventListener("click",()=>{

    const url =
        document
        .getElementById("imageUrl")
        .value
        .trim();

    if(!url) return;

    showImage(url);
});

document
.getElementById("fileInput")
.addEventListener("change",(e)=>{

    const file =
        e.target.files?.[0];

    if(!file) return;

    const reader =
        new FileReader();

    reader.onload = ()=>{

        showImage(reader.result);
    };

    reader.readAsDataURL(file);
});

viewer.addEventListener(
    "wheel",
    (e)=>{

        e.preventDefault();

        const rect = viewer.getBoundingClientRect();
        const mouseX = e.clientX - (rect.left + rect.width / 2);
        const mouseY = e.clientY - (rect.top + rect.height / 2);

        const oldScale = scale;

        if(e.deltaY < 0){
            scale *= 1.1;
        }
        else{
            scale /= 1.1;
        }

        scale = Math.max(
            0.05,
            Math.min(scale,50)
        );

        posX = mouseX - (mouseX - posX) * (scale / oldScale);
        posY = mouseY - (mouseY - posY) * (scale / oldScale);

        updateTransform();
    },
    {passive:false}
);

viewer.addEventListener(
    "mousedown",
    (e)=>{

        dragging = true;

        viewer.classList.add(
            "dragging"
        );

        dragStartX =
            e.clientX - posX;

        dragStartY =
            e.clientY - posY;
    }
);

window.addEventListener(
    "mousemove",
    (e)=>{

        if(!dragging) return;

        posX =
            e.clientX -
            dragStartX;

        posY =
            e.clientY -
            dragStartY;

        updateTransform();
    }
);

window.addEventListener(
    "mouseup",
    ()=>{

        dragging = false;

        viewer.classList.remove(
            "dragging"
        );
    }
);

viewer.addEventListener(
    "dblclick",
    resetView
);

document
.getElementById("zoomIn")
.addEventListener(
    "click",
    ()=>{

        scale *= 1.2;
        updateTransform();
    }
);

document
.getElementById("zoomOut")
.addEventListener(
    "click",
    ()=>{

        scale /= 1.2;
        updateTransform();
    }
);

document
.getElementById("resetBtn")
.addEventListener(
    "click",
    resetView
);

viewer.addEventListener(
    "dragover",
    (e)=>{
        e.preventDefault();
    }
);

viewer.addEventListener(
    "drop",
    (e)=>{

        e.preventDefault();

        const file =
            e.dataTransfer.files?.[0];

        if(!file) return;

        if(
            !file.type.startsWith(
                "image/"
            )
        ){
            return;
        }

        const reader =
            new FileReader();

        reader.onload = ()=>{

            showImage(reader.result);
        };

        reader.readAsDataURL(file);
    }
);

document.addEventListener(
    "paste",
    (e)=>{

        const items =
            e.clipboardData?.items || [];

        for(const item of items){

            if(
                item.type.startsWith(
                    "image/"
                )
            ){

                const file =
                    item.getAsFile();

                if(!file) continue;

                const reader =
                    new FileReader();

                reader.onload = ()=>{

                    showImage(
                        reader.result
                    );
                };

                reader.readAsDataURL(file);

                break;
            }
        }
    }
);

window.addEventListener(
    "resize",
    ()=>{

        if(
            image.src &&
            image.naturalWidth
        ){
            calculateFitScale();
        }
    }
);

image.addEventListener(
    "dragstart",
    e => e.preventDefault()
);
</script>

</body>
</html>
