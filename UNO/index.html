<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNO Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

  <!-- ===== TITLE SCREEN ===== -->
  <div id="screen-title" class="screen active">
    <div class="title-bg">
      <div class="floating-card card-red">7</div>
      <div class="floating-card card-blue">+2</div>
      <div class="floating-card card-green">⊘</div>
      <div class="floating-card card-yellow">⇄</div>
      <div class="floating-card card-wild">★</div>
    </div>
    <div class="title-content">
      <div class="title-logo">
        <span class="logo-u">U</span><span class="logo-n">N</span><span class="logo-o">O</span>
        <div class="logo-sub">ONLINE</div>
      </div>
      <div class="title-buttons">
        <button class="btn btn-primary btn-xl" onclick="showScreen('mode-select')">
          <span>ゲームを始める</span>
          <div class="btn-shine"></div>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== MODE SELECT ===== -->
  <div id="screen-mode-select" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('title')">← 戻る</button>
      <h2>モード選択</h2>
    </div>
    <div class="mode-cards">
      <div class="mode-card" onclick="showScreen('ai-setup')">
        <div class="mode-icon">🤖</div>
        <h3>AI対戦</h3>
        <p>コンピューターと対戦</p>
        <div class="mode-badge">1人プレイ</div>
      </div>
      <div class="mode-card" onclick="showScreen('online-select')">
        <div class="mode-icon">🌐</div>
        <h3>オンライン対戦</h3>
        <p>フレンドと対戦</p>
        <div class="mode-badge">2〜4人</div>
      </div>
    </div>
  </div>

  <!-- ===== AI SETUP ===== -->
  <div id="screen-ai-setup" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('mode-select')">← 戻る</button>
      <h2>AI対戦設定</h2>
    </div>
    <div class="setup-form">
      <div class="form-group">
        <label>プレイヤー名</label>
        <input type="text" id="ai-player-name" placeholder="あなたの名前" maxlength="12" value="プレイヤー">
      </div>
      <div class="form-group">
        <label>AI人数</label>
        <div class="number-picker">
          <button onclick="adjustAICount(-1)">−</button>
          <span id="ai-count">3</span>
          <button onclick="adjustAICount(1)">＋</button>
        </div>
      </div>
      <div class="form-group">
        <label>難易度</label>
        <div class="difficulty-select">
          <button class="diff-btn active" data-diff="easy" onclick="selectDifficulty(this)">Easy</button>
          <button class="diff-btn" data-diff="normal" onclick="selectDifficulty(this)">Normal</button>
          <button class="diff-btn" data-diff="hard" onclick="selectDifficulty(this)">Hard</button>
        </div>
      </div>
      <button class="btn btn-primary btn-lg" onclick="startAIGame()">
        ゲーム開始
      </button>
    </div>
  </div>

  <!-- ===== ONLINE SELECT ===== -->
  <div id="screen-online-select" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('mode-select')">← 戻る</button>
      <h2>オンライン対戦</h2>
    </div>
    <div class="mode-cards">
      <div class="mode-card" onclick="showScreen('create-room')">
        <div class="mode-icon">🏠</div>
        <h3>ルーム作成</h3>
        <p>新しいルームを作ってフレンドを招待</p>
      </div>
      <div class="mode-card" onclick="showScreen('join-room')">
        <div class="mode-icon">🚪</div>
        <h3>ルーム参加</h3>
        <p>ルームIDで参加する</p>
      </div>
    </div>
  </div>

  <!-- ===== CREATE ROOM ===== -->
  <div id="screen-create-room" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('online-select')">← 戻る</button>
      <h2>ルーム作成</h2>
    </div>
    <div class="setup-form">
      <div class="form-group">
        <label>プレイヤー名</label>
        <input type="text" id="host-player-name" placeholder="あなたの名前" maxlength="12" value="ホスト">
      </div>
      <div class="form-group">
        <label>ルーム名</label>
        <input type="text" id="room-name-input" placeholder="ルーム名" maxlength="20" value="UNO Room">
      </div>
      <div class="form-group">
        <label>最大人数</label>
        <div class="number-picker">
          <button onclick="adjustMaxPlayers(-1)">−</button>
          <span id="max-players-display">4</span>
          <button onclick="adjustMaxPlayers(1)">＋</button>
        </div>
      </div>
      <button class="btn btn-primary btn-lg" onclick="createRoom()">
        ルームを作成
      </button>
      <div id="create-room-status" class="status-message"></div>
    </div>
  </div>

  <!-- ===== JOIN ROOM ===== -->
  <div id="screen-join-room" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('online-select')">← 戻る</button>
      <h2>ルーム参加</h2>
    </div>
    <div class="setup-form">
      <div class="form-group">
        <label>プレイヤー名</label>
        <input type="text" id="join-player-name" placeholder="あなたの名前" maxlength="12" value="プレイヤー">
      </div>
      <div class="form-group">
        <label>ルームID</label>
        <input type="text" id="room-id-input" placeholder="6桁のルームID" maxlength="6" style="text-transform:uppercase">
      </div>
      <button class="btn btn-primary btn-lg" onclick="joinRoom()">
        参加する
      </button>
      <div id="join-room-status" class="status-message"></div>
    </div>
  </div>

  <!-- ===== LOBBY ===== -->
  <div id="screen-lobby" class="screen">
    <div class="screen-header">
      <button class="btn-back" id="lobby-back-btn" onclick="leaveLobby()">← 退出</button>
      <h2>ロビー</h2>
    </div>
    <div class="lobby-container">
      <div class="lobby-info">
        <div class="room-id-display">
          <span class="label">ルームID</span>
          <span id="display-room-id" class="room-id-big">------</span>
          <button class="btn-copy" onclick="copyRoomId()">コピー</button>
        </div>
        <div class="invite-url-display">
          <span class="label">招待URL</span>
          <input type="text" id="invite-url" readonly>
          <button class="btn-copy" onclick="copyInviteUrl()">コピー</button>
        </div>
      </div>
      <div class="player-list">
        <h3>参加者 <span id="player-count">0</span>/<span id="max-player-count">4</span></h3>
        <div id="players-grid"></div>
      </div>
      <div id="lobby-actions">
        <button class="btn btn-primary btn-lg" id="start-game-btn" onclick="startOnlineGame()" style="display:none">
          ゲーム開始
        </button>
        <p id="waiting-message" class="waiting-text">ホストがゲームを開始するまで待ちます...</p>
      </div>
    </div>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="screen-game" class="screen">
    <!-- Top: Other players -->
    <div id="opponents-area"></div>

    <!-- Center: Game table -->
    <div class="game-table">
      <div class="deck-area">
        <div class="card-back card-pile" id="draw-pile" onclick="handleDrawCard()" title="山札からドロー">
          <div class="card-back-design"></div>
          <div class="pile-count" id="draw-count">52</div>
        </div>
        <div class="discard-pile-wrapper">
          <div id="discard-pile" class="discard-display">
            <div class="empty-pile">捨て札</div>
          </div>
        </div>
      </div>
      <div class="game-info-bar">
        <div class="turn-indicator" id="turn-indicator">準備中...</div>
        <div class="direction-indicator" id="direction-indicator">→</div>
        <div class="draw-stack-indicator" id="draw-stack-display" style="display:none">
          +<span id="draw-stack-count">0</span>
        </div>
      </div>
    </div>

    <!-- Bottom: My hand -->
    <div class="my-area">
      <div class="my-info">
        <span id="my-name-display">プレイヤー</span>
        <span class="card-count-badge" id="my-card-count">0</span>
        <button class="uno-btn" id="uno-btn" onclick="declareUno()" style="display:none">UNO!</button>
      </div>
      <div class="hand-container" id="my-hand"></div>
    </div>

    <!-- Color picker modal -->
    <div id="color-picker" class="modal" style="display:none">
      <div class="modal-content">
        <h3>色を選んでください</h3>
        <div class="color-options">
          <button class="color-btn red" onclick="selectColor('red')">赤</button>
          <button class="color-btn blue" onclick="selectColor('blue')">青</button>
          <button class="color-btn green" onclick="selectColor('green')">緑</button>
          <button class="color-btn yellow" onclick="selectColor('yellow')">黄</button>
        </div>
      </div>
    </div>

    <!-- Toast notifications -->
    <div id="toast-container"></div>

    <!-- Action overlay -->
    <div id="action-overlay" class="action-overlay" style="display:none">
      <div class="action-text" id="action-text"></div>
    </div>
  </div>

  <!-- ===== RESULT SCREEN ===== -->
  <div id="screen-result" class="screen">
    <div class="result-container">
      <div class="result-fireworks">
        <div class="fw fw1"></div>
        <div class="fw fw2"></div>
        <div class="fw fw3"></div>
      </div>
      <h2 class="result-title" id="result-title">ゲーム終了!</h2>
      <div class="ranking-list" id="ranking-list"></div>
      <div class="result-buttons">
        <button class="btn btn-primary btn-lg" onclick="returnToTitle()">タイトルへ</button>
        <button class="btn btn-secondary btn-lg" id="play-again-btn" onclick="playAgain()" style="display:none">もう一度</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
